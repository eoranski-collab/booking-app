<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>קביעת תור - MyCut</title>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;800;900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Heebo',sans-serif;background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;direction:rtl}
        .card{background:rgba(255,255,255,0.05);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,0.1);border-radius:24px;padding:40px;max-width:480px;width:100%;box-shadow:0 30px 80px rgba(0,0,0,0.6)}
        .logo{text-align:center;margin-bottom:24px}
        .logo .icon{font-size:48px;background:linear-gradient(135deg,#f093fb,#f5576c);width:70px;height:70px;line-height:70px;border-radius:20px;display:inline-block;box-shadow:0 12px 40px rgba(245,87,108,0.3)}
        .logo h1{font-size:28px;font-weight:900;color:#fff;margin-top:12px;letter-spacing:-0.5px}
        .logo .sub{color:rgba(255,255,255,0.5);font-size:14px;margin-top:4px}
        .form-group{margin-bottom:16px}
        .form-group label{display:block;color:rgba(255,255,255,0.7);font-size:13px;font-weight:500;margin-bottom:4px}
        .form-group label .req{color:#f5576c}
        .form-group input,.form-group select{width:100%;padding:12px 16px;background:rgba(255,255,255,0.07);border:2px solid rgba(255,255,255,0.08);border-radius:12px;color:#fff;font-size:15px;font-family:'Heebo',sans-serif;transition:all 0.3s;outline:none}
        .form-group input:focus,.form-group select:focus{border-color:#f5576c;background:rgba(255,255,255,0.1);box-shadow:0 0 0 4px rgba(245,87,108,0.1)}
        .form-group input::placeholder{color:rgba(255,255,255,0.3)}
        .form-group select option{background:#1a1a2e;color:#fff}
        .form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
        @media(max-width:480px){.form-row{grid-template-columns:1fr}}
        .btn{width:100%;padding:14px;background:linear-gradient(135deg,#f093fb,#f5576c);color:#fff;border:none;border-radius:12px;font-size:18px;font-weight:700;cursor:pointer;transition:all 0.3s;box-shadow:0 8px 30px rgba(245,87,108,0.3);font-family:'Heebo',sans-serif}
        .btn:hover{transform:translateY(-2px);box-shadow:0 12px 40px rgba(245,87,108,0.5)}
        .btn:disabled{opacity:0.6;cursor:not-allowed;transform:none}
        .alert{padding:12px 16px;border-radius:12px;margin-bottom:16px;display:none;text-align:center;font-size:14px;font-weight:500}
        .alert.show{display:block}
        .alert-error{background:rgba(245,87,108,0.15);border:1px solid rgba(245,87,108,0.2);color:#f5576c}
        .alert-success{background:rgba(72,187,120,0.15);border:1px solid rgba(72,187,120,0.2);color:#48bb78}
        .spinner{display:inline-block;width:20px;height:20px;border:2px solid rgba(255,255,255,0.3);border-top-color:#fff;border-radius:50%;animation:spin 0.8s linear infinite;vertical-align:middle;margin-left:8px}
        @keyframes spin{to{transform:rotate(360deg)}}
        .footer{text-align:center;margin-top:20px;color:rgba(255,255,255,0.25);font-size:12px}
        .success-box{text-align:center;padding:20px 0}
        .success-box .icon{font-size:56px;margin-bottom:12px}
        .success-box h3{color:#48bb78;margin-bottom:4px}
        .success-box p{color:rgba(255,255,255,0.5);font-size:14px}
        .loading{text-align:center;padding:20px;color:rgba(255,255,255,0.5)}
        .loading .spinner{display:inline-block;margin:0}
    </style>
</head>
<body>
<div class="card">
    <div class="logo">
        <div class="icon">✂️</div>
        <h1 id="businessName">MyCut</h1>
        <div class="sub">📅 קבע תור בקלות</div>
    </div>

    <div id="alert" class="alert"></div>

    <div id="loadingMessage" class="loading">
        <span class="spinner"></span> טוען...
    </div>

    <form id="bookingForm" style="display:none;">
        <div class="form-group">
            <label>שם מלא <span class="req">*</span></label>
            <input type="text" id="customerName" placeholder="הכנס את שמך" required />
        </div>
        <div class="form-group">
            <label>טלפון <span class="req">*</span></label>
            <input type="tel" id="customerPhone" placeholder="050-1234567" required />
        </div>
        <div class="form-group">
            <label>שירות <span class="req">*</span></label>
            <select id="serviceId" required>
                <option value="">בחר שירות...</option>
            </select>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label>תאריך <span class="req">*</span></label>
                <input type="date" id="appointmentDate" required />
            </div>
            <div class="form-group">
                <label>שעה <span class="req">*</span></label>
                <input type="time" id="appointmentTime" required />
            </div>
        </div>
        <button type="submit" class="btn" id="bookBtn">📅 קבע תור</button>
    </form>

    <div class="footer">
        <i class="fas fa-lock" style="margin-left:4px;"></i> המידע שלך מאובטח
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2">
</script>
<script>
    // ================================================
    // הגדרות
    // ================================================
    const SUPABASE_URL = 'https://bcbnvtszkfjhfujnxldm.supabase.co';
    const SUPABASE_ANON = 'sb_publishable_IzFYbwo2gI65OvmBM53-5g_lAffckNt';
    const { createClient } = supabase;
    const sb = createClient(SUPABASE_URL, SUPABASE_ANON);

    let businessId = null;
    let services = [];
    let existingAppointments = [];
    let businessHours = [];

    // ================================================
    // שליפת נתוני העסק
    // ================================================
    async function loadBusinessData() {
        try {
            const params = new URLSearchParams(window.location.search);
            let businessIdFromUrl = params.get('business');

            if (!businessIdFromUrl) {
                const { data: bizByEmail } = await sb
                    .from('businesses')
                    .select('id, name')
                    .eq('email', 'opir123@business.com')
                    .limit(1);

                if (bizByEmail && bizByEmail.length > 0) {
                    businessId = bizByEmail[0].id;
                    document.getElementById('businessName').textContent = bizByEmail[0].name;
                } else {
                    const { data: firstBiz } = await sb
                        .from('businesses')
                        .select('id, name')
                        .limit(1);

                    if (firstBiz && firstBiz.length > 0) {
                        businessId = firstBiz[0].id;
                        document.getElementById('businessName').textContent = firstBiz[0].name;
                    } else {
                        showAlert('❌ לא נמצא עסק', 'error');
                        document.getElementById('loadingMessage').style.display = 'none';
                        return;
                    }
                }
            } else {
                const { data: bizById } = await sb
                    .from('businesses')
                    .select('id, name')
                    .eq('id', businessIdFromUrl)
                    .limit(1);

                if (bizById && bizById.length > 0) {
                    businessId = bizById[0].id;
                    document.getElementById('businessName').textContent = bizById[0].name;
                } else {
                    showAlert('❌ עסק לא נמצא', 'error');
                    document.getElementById('loadingMessage').style.display = 'none';
                    return;
                }
            }

            document.getElementById('loadingMessage').style.display = 'none';
            document.getElementById('bookingForm').style.display = 'block';

            await loadServices();
            await loadExistingAppointments();
            await loadBusinessHours();

        } catch (error) {
            console.error('❌ שגיאה:', error);
            showAlert('❌ שגיאה בטעינת הנתונים', 'error');
            document.getElementById('loadingMessage').style.display = 'none';
        }
    }

    // ================================================
    // שליפת שעות עבודה
    // ================================================
    async function loadBusinessHours() {
        if (!businessId) return;

        const { data, error } = await sb
            .from('business_hours')
            .select('*')
            .eq('business_id', businessId);

        if (error) {
            console.error('❌ שגיאת שעות עבודה:', error);
            return;
        }

        businessHours = data || [];
        console.log('🕐 שעות עבודה:', businessHours);
    }

    // ================================================
    // בדיקת זמינות מתקדמת - כולל שעות עבודה
    // ================================================
    async function checkAvailability(startTime, endTime, employeeId = null) {
        const date = new Date(startTime);
        const dayOfWeek = date.getDay(); // 0=ראשון, 6=שבת
        const timeStr = date.toTimeString().slice(0, 5); // HH:MM

        // 1. בדיקת חגים
        const dateStr = date.toISOString().split('T')[0];
        const { data: holidays } = await sb
            .from('holidays')
            .select('*')
            .eq('business_id', businessId)
            .eq('holiday_date', dateStr)
            .eq('is_closed', true);

        if (holidays && holidays.length > 0) {
            return { available: false, reason: '🏖️ העסק סגור בחג זה' };
        }

        // 2. בדיקת שעות עבודה
        const dayHours = businessHours.find(h => h.day_of_week === dayOfWeek);

        if (!dayHours || dayHours.is_open === false) {
            return { available: false, reason: '⏰ העסק סגור ביום זה' };
        }

        // בדיקה אם השעה בגדר שעות הפתיחה
        if (timeStr < dayHours.open_time || timeStr > dayHours.close_time) {
            return { 
                available: false, 
                reason: `⏰ שעות פעילות: ${dayHours.open_time} - ${dayHours.close_time}` 
            };
        }

        // 3. בדיקת התנגשות תורים
        const { data: conflicts } = await sb
            .from('appointments')
            .select('*')
            .eq('business_id', businessId)
            .not('status', 'eq', 'cancelled')
            .or(`employee_id.eq.${employeeId || ''},employee_id.is.null`)
            .filter('start_time', 'lt', endTime)
            .filter('end_time', 'gt', startTime);

        if (conflicts && conflicts.length > 0) {
            return { available: false, reason: '❌ השעה תפוסה' };
        }

        return { available: true };
    }

    // ================================================
    // שליפת שירותים
    // ================================================
    async function loadServices() {
        if (!businessId) return;

        const { data, error } = await sb
            .from('services')
            .select('*')
            .eq('business_id', businessId)
            .eq('is_active', true)
            .order('name');

        if (error) {
            console.error('❌ שגיאת שירותים:', error);
            return;
        }

        services = data || [];
        populateServices();

        if (services.length === 0) {
            showAlert('⚠️ אין שירותים זמינים', 'error');
        }
    }

    function populateServices() {
        const select = document.getElementById('serviceId');
        select.innerHTML = '<option value="">בחר שירות...</option>';

        services.forEach(s => {
            const option = document.createElement('option');
            option.value = s.id;
            option.textContent = `${s.name} (${s.duration_minutes} דקות, ${s.price}₪)`;
            select.appendChild(option);
        });

        if (services.length === 0) {
            select.innerHTML += '<option value="" disabled>אין שירותים זמינים</option>';
        }
    }

    // ================================================
    // שליפת תורים קיימים
    // ================================================
    async function loadExistingAppointments() {
        if (!businessId) return;

        const { data, error } = await sb
            .from('appointments')
            .select('start_time, end_time')
            .eq('business_id', businessId)
            .not('status', 'eq', 'cancelled');

        if (error) {
            console.error('❌ שגיאת תורים:', error);
            return;
        }

        existingAppointments = data || [];
        console.log('📅 תורים קיימים:', existingAppointments.length);
    }

    // ================================================
    // הודעות
    // ================================================
    function showAlert(msg, type = 'error') {
        const alert = document.getElementById('alert');
        alert.textContent = msg;
        alert.className = `alert alert-${type} show`;
        clearTimeout(window.alertTimeout);
        window.alertTimeout = setTimeout(() => {
            alert.className = 'alert';
        }, 6000);
    }

    function hideAlert() {
        document.getElementById('alert').className = 'alert';
    }

    // ================================================
    // הגבלת תאריכים
    // ================================================
    function setDateLimits() {
        const dateInput = document.getElementById('appointmentDate');
        const today = new Date();
        today.setHours(0, 0, 0, 0);
        dateInput.min = today.toISOString().split('T')[0];

        const maxDate = new Date(today);
        maxDate.setDate(maxDate.getDate() + 30);
        dateInput.max = maxDate.toISOString().split('T')[0];
    }

    // ================================================
    // עדכון שעות זמינות - הגבלה לשעות העבודה
    // ================================================
    document.getElementById('appointmentDate').addEventListener('change', function() {
        const date = this.value;
        const dayOfWeek = new Date(date + 'T00:00:00').getDay();
        const dayHours = businessHours.find(h => h.day_of_week === dayOfWeek);
        
        const timeInput = document.getElementById('appointmentTime');
        if (dayHours && dayHours.is_open) {
            timeInput.min = dayHours.open_time;
            timeInput.max = dayHours.close_time;
            timeInput.placeholder = `${dayHours.open_time} - ${dayHours.close_time}`;
        } else {
            timeInput.min = '';
            timeInput.max = '';
            timeInput.placeholder = 'יום סגור';
            showAlert('⏰ העסק סגור ביום זה', 'error');
        }
    });

    // ================================================
    // שליחת הטופס
    // ================================================
    document.getElementById('bookingForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        hideAlert();

        const name = document.getElementById('customerName').value.trim();
        const phone = document.getElementById('customerPhone').value.trim();
        const serviceId = document.getElementById('serviceId').value;
        const date = document.getElementById('appointmentDate').value;
        const time = document.getElementById('appointmentTime').value;

        if (!name) { showAlert('❌ יש להכניס שם', 'error'); return; }
        if (!phone) { showAlert('❌ יש להכניס טלפון', 'error'); return; }
        if (!serviceId) { showAlert('❌ יש לבחור שירות', 'error'); return; }
        if (!date) { showAlert('❌ יש לבחור תאריך', 'error'); return; }
        if (!time) { showAlert('❌ יש לבחור שעה', 'error'); return; }

        const service = services.find(s => s.id === serviceId);
        if (!service) { showAlert('❌ שירות לא נמצא', 'error'); return; }

        const startTime = new Date(`${date}T${time}:00`);
        const endTime = new Date(startTime.getTime() + service.duration_minutes * 60000);

        // בדיקת זמינות
        const availability = await checkAvailability(
            startTime.toISOString(), 
            endTime.toISOString()
        );

        if (!availability.available) {
            showAlert(availability.reason, 'error');
            return;
        }

        const bookBtn = document.getElementById('bookBtn');
        bookBtn.disabled = true;
        bookBtn.innerHTML = 'יוצר תור <span class="spinner"></span>';

        try {
            const { data, error } = await sb
                .from('appointments')
                .insert([{
                    business_id: businessId,
                    customer_name: name,
                    customer_phone: phone,
                    service_id: serviceId,
                    service_name: service.name,
                    start_time: startTime.toISOString(),
                    end_time: endTime.toISOString(),
                    price: service.price,
                    status: 'pending'
                }])
                .select()
                .single();

            if (error) throw error;

            document.getElementById('bookingForm').innerHTML = `
                    <div class="success-box">
                        <div class="icon">🎉</div>
                        <h3>התור נקבע בהצלחה!</h3>
                        <p>${name}, נשלח לך אישור בטלפון ${phone}</p>
                        <p style="margin-top:12px;font-size:13px;color:rgba(255,255,255,0.3);">
                            ${service.name} • ${new Date(startTime).toLocaleString('he-IL')}
                        </p>
                        <button class="btn" onclick="location.reload()" style="margin-top:16px;padding:10px;">📅 תור נוסף</button>
                    </div>
                `;

            await loadExistingAppointments();

        } catch (error) {
            console.error('❌ שגיאה:', error);
            showAlert('❌ שגיאה: ' + error.message, 'error');
            bookBtn.disabled = false;
            bookBtn.innerHTML = '📅 קבע תור';
        }
    });

    // ================================================
    // התחלה
    // ================================================
    document.addEventListener('DOMContentLoaded', () => {
        setDateLimits();
        loadBusinessData();
    });
</script>
</body>
</html>
