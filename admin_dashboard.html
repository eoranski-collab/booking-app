<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>דשבורד - MyCut</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:Arial,sans-serif;background:#f0f2f5;direction:rtl}
        .header{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:white;padding:20px 30px;display:flex;justify-content:space-between;align-items:center}
        .header h1{font-size:24px}
        .header .user-info{display:flex;align-items:center;gap:15px}
        .header button{background:rgba(255,255,255,0.2);border:1px solid rgba(255,255,255,0.3);color:white;padding:8px 16px;border-radius:8px;cursor:pointer}
        .header button:hover{background:rgba(255,255,255,0.3)}
        
        .container{max-width:1200px;margin:30px auto;padding:0 20px}
        .stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:20px;margin-bottom:30px}
        .stat-card{background:white;padding:20px;border-radius:12px;box-shadow:0 2px 8px rgba(0,0,0,0.1);text-align:center}
        .stat-card .number{font-size:32px;font-weight:bold;color:#667eea}
        .stat-card .label{color:#666;margin-top:5px}
        
        .section{background:white;border-radius:12px;padding:20px;margin-bottom:20px;box-shadow:0 2px 8px rgba(0,0,0,0.1)}
        .section h2{margin-bottom:15px;color:#333}
        .section .empty{text-align:center;padding:40px;color:#999}
        
        .appointment-item{display:flex;justify-content:space-between;align-items:center;padding:12px;border-bottom:1px solid #eee}
        .appointment-item:last-child{border-bottom:none}
        .appointment-info{flex:1}
        .appointment-info .name{font-weight:bold;font-size:16px}
        .appointment-info .details{color:#666;font-size:14px;margin-top:3px}
        .appointment-status{padding:4px 12px;border-radius:20px;font-size:12px;font-weight:bold}
        .status-pending{background:#fff3cd;color:#856404}
        .status-confirmed{background:#d4edda;color:#155724}
        .status-cancelled{background:#f8d7da;color:#721c24}
        .status-completed{background:#cce5ff;color:#004085}
        
        .btn{background:#667eea;color:white;border:none;padding:6px 12px;border-radius:6px;cursor:pointer;font-size:13px}
        .btn:hover{background:#5a67d8}
        .btn-danger{background:#e53e3e}
        .btn-danger:hover{background:#c53030}
        
        .tabs{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap}
        .tab{background:#e2e8f0;border:none;padding:10px 20px;border-radius:8px;cursor:pointer;font-size:14px}
        .tab.active{background:#667eea;color:white}
        
        .form-group{margin-bottom:15px}
        .form-group label{display:block;font-weight:bold;margin-bottom:5px;color:#333}
        .form-group input,.form-group select{width:100%;padding:10px;border:2px solid #ddd;border-radius:8px;font-size:14px;box-sizing:border-box}
        .form-group input:focus,.form-group select:focus{border-color:#667eea;outline:none}
        .form-row{display:grid;grid-template-columns:1fr 1fr;gap:15px}
        @media(max-width:600px){.form-row{grid-template-columns:1fr}}
        
        .modal{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);z-index:1000;align-items:center;justify-content:center}
        .modal.show{display:flex}
        .modal-content{background:white;border-radius:16px;padding:30px;max-width:500px;width:90%;max-height:90vh;overflow-y:auto}
        .modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
        .modal-header h2{margin:0}
        .modal-close{background:none;border:none;font-size:24px;cursor:pointer;color:#999}
        .modal-close:hover{color:#333}
        .modal .btn{width:100%;padding:12px;font-size:16px;margin-top:10px}
    </style>
</head>
<body>

<!-- ========== HEADER ========== -->
<div class="header">
    <h1>✂️ MyCut - ניהול עסק</h1>
    <div class="user-info">
        <span id="businessNameDisplay">טוען...</span>
        <button onclick="logout()">התנתק</button>
    </div>
</div>

<!-- ========== MAIN ========== -->
<div class="container">
    <!-- סטטיסטיקות -->
    <div class="stats">
        <div class="stat-card">
            <div class="number" id="todayCount">0</div>
            <div class="label">📅 תורים להיום</div>
        </div>
        <div class="stat-card">
            <div class="number" id="pendingCount">0</div>
            <div class="label">⏳ ממתינים לאישור</div>
        </div>
        <div class="stat-card">
            <div class="number" id="customersCount">0</div>
            <div class="label">👤 לקוחות</div>
        </div>
        <div class="stat-card">
            <div class="number" id="servicesCount">0</div>
            <div class="label">✂️ שירותים</div>
        </div>
    </div>

    <!-- טאבים -->
    <div class="tabs">
        <button class="tab active" onclick="switchTab('today')">📅 היום</button>
        <button class="tab" onclick="switchTab('all')">📋 כל התורים</button>
        <button class="tab" onclick="switchTab('add')">➕ תור חדש</button>
        <button class="tab" onclick="switchTab('services')">✂️ ניהול שירותים</button>
    </div>

    <!-- ===== תוכן טאבים ===== -->
    <div id="tabContent"></div>
</div>

<!-- ========== MODAL ========== -->
<div class="modal" id="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h2 id="modalTitle">פרטי תור</h2>
            <button class="modal-close" onclick="closeModal()">✕</button>
        </div>
        <div id="modalBody"></div>
    </div>
</div>

<!-- ============================================ -->
<!-- Supabase                                     -->
<!-- ============================================ -->
<script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';
    
    const SUPABASE_URL = 'https://bcbnvtszkfjhfujnxldm.supabase.co';
    const SUPABASE_ANON = 'sb_publishable_IzFYbwo2gI65OvmBM53-5g_lAffckNt';
    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON);

    // ============================================
    // משתנים גלובליים
    // ============================================
    let currentBusiness = null;
    let currentUser = null;
    let appointments = [];
    let services = [];

    // ============================================
    // פונקציות עזר
    // ============================================
    function formatTime(dateStr) {
        const d = new Date(dateStr);
        return d.toLocaleTimeString('he-IL', { hour: '2-digit', minute: '2-digit' });
    }

    function formatDate(dateStr) {
        const d = new Date(dateStr);
        return d.toLocaleDateString('he-IL');
    }

    function getStatusLabel(status) {
        const map = {
            'pending': '⏳ ממתין',
            'confirmed': '✅ מאושר',
            'cancelled': '❌ מבוטל',
            'completed': '✔️ הושלם'
        };
        return map[status] || status;
    }

    function getStatusClass(status) {
        const map = {
            'pending': 'status-pending',
            'confirmed': 'status-confirmed',
            'cancelled': 'status-cancelled',
            'completed': 'status-completed'
        };
        return map[status] || '';
    }

    // ============================================
    // אימות
    // ============================================
    async function checkAuth() {
        const { data: { user } } = await supabase.auth.getUser();
        if (!user) {
            window.location.href = 'login.html';
            return null;
        }
        currentUser = user;
        return user;
    }

    async function getBusiness() {
        if (!currentUser) return null;
        
        const { data: userData } = await supabase
            .from('users')
            .select('business_id')
            .eq('id', currentUser.id)
            .single();
            
        if (!userData) return null;
        
        const { data: business } = await supabase
            .from('businesses')
            .select('*')
            .eq('id', userData.business_id)
            .single();
            
        currentBusiness = business;
        document.getElementById('businessNameDisplay').textContent = business?.name || 'עסק';
        return business;
    }

    // ============================================
    // שליפת נתונים
    // ============================================
    async function loadAppointments() {
        if (!currentBusiness) return;
        
        const today = new Date();
        today.setHours(0, 0, 0, 0);
        
        const { data, error } = await supabase
            .from('appointments')
            .select('*')
            .eq('business_id', currentBusiness.id)
            .gte('start_time', today.toISOString())
            .order('start_time', { ascending: true });
            
        if (error) {
            console.error('שגיאת תורים:', error);
            return;
        }
        appointments = data || [];
        return appointments;
    }

    async function loadServices() {
        if (!currentBusiness) return;
        
        const { data, error } = await supabase
            .from('services')
            .select('*')
            .eq('business_id', currentBusiness.id)
            .eq('is_active', true);
            
        if (error) {
            console.error('שגיאת שירותים:', error);
            return;
        }
        services = data || [];
        return services;
    }

    // ============================================
    // הצגת תוכן
    // ============================================
    function renderToday() {
        const today = new Date();
        today.setHours(0, 0, 0, 0);
        
        const todayApps = appointments.filter(a => {
            const d = new Date(a.start_time);
            return d >= today;
        });

        if (todayApps.length === 0) {
            return `<div class="empty">📭 אין תורים להיום</div>`;
        }

        return todayApps.map(a => `
            <div class="appointment-item">
                <div class="appointment-info">
                    <div class="name">${a.customer_name || 'לקוח'} - ${a.service_name || 'שירות'}</div>
                    <div class="details">📞 ${a.customer_phone || ''} | 🕐 ${formatTime(a.start_time)}</div>
                </div>
                <div>
                    <span class="appointment-status ${getStatusClass(a.status)}">${getStatusLabel(a.status)}</span>
                    <button class="btn btn-danger" onclick="cancelAppointment('${a.id}')" style="margin-right:8px">❌ בטל</button>
                </div>
            </div>
        `).join('');
    }

    function renderAll() {
        if (appointments.length === 0) {
            return `<div class="empty">📭 אין תורים</div>`;
        }

        return appointments.map(a => `
            <div class="appointment-item">
                <div class="appointment-info">
                    <div class="name">${a.customer_name || 'לקוח'} - ${a.service_name || 'שירות'}</div>
                    <div class="details">📅 ${formatDate(a.start_time)} | 🕐 ${formatTime(a.start_time)} | 📞 ${a.customer_phone || ''}</div>
                </div>
                <div>
                    <span class="appointment-status ${getStatusClass(a.status)}">${getStatusLabel(a.status)}</span>
                    <button class="btn btn-danger" onclick="cancelAppointment('${a.id}')" style="margin-right:8px">❌ בטל</button>
                </div>
            </div>
        `).join('');
    }

    function renderAddAppointment() {
        const serviceOptions = services.map(s => 
            `<option value="${s.id}">${s.name} (${s.duration_minutes} דקות, ${s.price}₪)</option>`
        ).join('');

        return `
            <h3>➕ תור חדש</h3>
            <form id="addAppointmentForm">
                <div class="form-group">
                    <label>שם לקוח *</label>
                    <input type="text" id="customerName" required>
                </div>
                <div class="form-group">
                    <label>טלפון *</label>
                    <input type="tel" id="customerPhone" required>
                </div>
                <div class="form-group">
                    <label>שירות *</label>
                    <select id="serviceId" required>
                        <option value="">בחר שירות...</option>
                        ${serviceOptions}
                    </select>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>תאריך *</label>
                        <input type="date" id="appointmentDate" required>
                    </div>
                    <div class="form-group">
                        <label>שעה *</label>
                        <input type="time" id="appointmentTime" required>
                    </div>
                </div>
                <button type="submit" class="btn" style="width:100%;padding:12px;font-size:16px">💾 שמור תור</button>
            </form>
        `;
    }

    function renderServices() {
        if (services.length === 0) {
            return `
                <div class="empty">✂️ אין שירותים</div>
                <button class="btn" onclick="showAddService()">➕ הוסף שירות</button>
            `;
        }

        return `
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:15px">
                <h3>✂️ השירותים שלי</h3>
                <button class="btn" onclick="showAddService()">➕ הוסף שירות</button>
            </div>
            ${services.map(s => `
                <div class="appointment-item">
                    <div>
                        <strong>${s.name}</strong>
                        <span style="color:#666;margin-right:10px">${s.duration_minutes} דקות</span>
                        <span style="color:#667eea;font-weight:bold">${s.price}₪</span>
                    </div>
                    <button class="btn btn-danger" onclick="deleteService('${s.id}')">🗑️</button>
                </div>
            `).join('')}
        `;
    }

    // ============================================
    // ניהול טאבים
    // ============================================
    window.switchTab = function(tab) {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.tab')[['today','all','add','services'].indexOf(tab)].classList.add('active');
        
        const container = document.getElementById('tabContent');
        switch(tab) {
            case 'today': container.innerHTML = renderToday(); break;
            case 'all': container.innerHTML = renderAll(); break;
            case 'add': container.innerHTML = renderAddAppointment(); break;
            case 'services': container.innerHTML = renderServices(); break;
        }
        
        // מאזינים לטפסים
        if (tab === 'add') {
            document.getElementById('addAppointmentForm')?.addEventListener('submit', handleAddAppointment);
        }
    };

    // ============================================
    // יצירת תור
    // ============================================
    async function handleAddAppointment(e) {
        e.preventDefault();
        if (!currentBusiness) return;

        const customerName = document.getElementById('customerName').value.trim();
        const customerPhone = document.getElementById('customerPhone').value.trim();
        const serviceId = document.getElementById('serviceId').value;
        const date = document.getElementById('appointmentDate').value;
        const time = document.getElementById('appointmentTime').value;

        if (!customerName || !customerPhone || !serviceId || !date || !time) {
            alert('❌ יש למלא את כל השדות');
            return;
        }

        const service = services.find(s => s.id === serviceId);
        if (!service) {
            alert('❌ שירות לא נמצא');
            return;
        }

        const startTime = new Date(`${date}T${time}:00`);
        const endTime = new Date(startTime.getTime() + service.duration_minutes * 60000);

        try {
            const { data, error } = await supabase
                .from('appointments')
                .insert([{
                    business_id: currentBusiness.id,
                    customer_name: customerName,
                    customer_phone: customerPhone,
                    service_id: serviceId,
                    service_name: service.name,
                    start_time: startTime.toISOString(),
                    end_time: endTime.toISOString(),
                    price: service.price,
                    status: 'confirmed'
                }]);

            if (error) {
                console.error('שגיאת יצירת תור:', error);
                alert('❌ שגיאה: ' + error.message);
                return;
            }

            alert('✅ התור נוצר בהצלחה!');
            await loadAppointments();
            switchTab('today');
        } catch (err) {
            alert('❌ שגיאה: ' + err.message);
        }
    }

    // ============================================
    // ביטול תור
    // ============================================
    window.cancelAppointment = async function(id) {
        if (!confirm('האם אתה בטוח שברצונך לבטל את התור?')) return;
        
        try {
            const { error } = await supabase
                .from('appointments')
                .update({ status: 'cancelled' })
                .eq('id', id);

            if (error) throw error;
            
            alert('✅ התור בוטל בהצלחה');
            await loadAppointments();
            switchTab('today');
        } catch (err) {
            alert('❌ שגיאה: ' + err.message);
        }
    };

    // ============================================
    // ניהול שירותים
    // ============================================
    window.showAddService = function() {
        const name = prompt('📝 שם השירות:');
        if (!name) return;
        
        const duration = prompt('⏱️ משך זמן (בדקות):');
        if (!duration || isNaN(duration)) return;
        
        const price = prompt('💰 מחיר (בש"ח):');
        if (!price || isNaN(price)) return;

        addService(name, parseInt(duration), parseFloat(price));
    };

    async function addService(name, duration, price) {
        if (!currentBusiness) return;
        
        try {
            const { error } = await supabase
                .from('services')
                .insert([{
                    business_id: currentBusiness.id,
                    name: name,
                    duration_minutes: duration,
                    price: price,
                    is_active: true
                }]);

            if (error) throw error;
            
            alert('✅ השירות נוסף בהצלחה');
            await loadServices();
            switchTab('services');
        } catch (err) {
            alert('❌ שגיאה: ' + err.message);
        }
    }

    window.deleteService = async function(id) {
        if (!confirm('האם בטוח?')) return;
        
        try {
            const { error } = await supabase
                .from('services')
                .update({ is_active: false })
                .eq('id', id);

            if (error) throw error;
            
            alert('✅ השירות נמחק');
            await loadServices();
            switchTab('services');
        } catch (err) {
            alert('❌ שגיאה: ' + err.message);
        }
    };

    // ============================================
    // התנתקות
    // ============================================
    window.logout = async function() {
        await supabase.auth.signOut();
        localStorage.clear();
        window.location.href = 'login.html';
    };

    // ============================================
    // אתחול
    // ============================================
    async function init() {
        const user = await checkAuth();
        if (!user) return;
        
        await getBusiness();
        if (!currentBusiness) {
            alert('❌ לא נמצא עסק. אנא צור קשר עם התמיכה.');
            return;
        }
        
        await loadServices();
        await loadAppointments();
        
        // סטטיסטיקות
        const today = new Date();
        today.setHours(0, 0, 0, 0);
        const todayApps = appointments.filter(a => new Date(a.start_time) >= today);
        const pendingApps = appointments.filter(a => a.status === 'pending');
        
        document.getElementById('todayCount').textContent = todayApps.length;
        document.getElementById('pendingCount').textContent = pendingApps.length;
        document.getElementById('customersCount').textContent = appointments.filter(a => a.customer_name).length;
        document.getElementById('servicesCount').textContent = services.length;
        
        switchTab('today');
    }

    init();
</script>
</body>
</html>
