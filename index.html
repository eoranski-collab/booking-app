<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyCut - מערכת ניהול תורים</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:Arial,sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px}
        .card{background:white;border-radius:24px;padding:50px 40px;max-width:600px;width:100%;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,0.3)}
        .logo{font-size:64px;margin-bottom:10px}
        h1{font-size:36px;color:#333;margin-bottom:8px}
        .subtitle{color:#666;font-size:18px;margin-bottom:30px}
        .features{display:grid;grid-template-columns:1fr 1fr;gap:15px;margin:30px 0;text-align:right}
        .feature{background:#f8f9fa;padding:15px;border-radius:12px}
        .feature .icon{font-size:24px}
        .feature .text{font-size:14px;color:#555;margin-top:5px}
        .buttons{display:flex;gap:15px;flex-wrap:wrap;justify-content:center;margin-top:20px}
        .btn{display:inline-block;padding:14px 40px;border-radius:12px;font-size:18px;font-weight:bold;text-decoration:none;transition:all 0.3s}
        .btn-primary{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:white}
        .btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 25px rgba(102,126,234,0.4)}
        .btn-outline{border:2px solid #667eea;color:#667eea;background:transparent}
        .btn-outline:hover{background:#667eea;color:white}
        .footer{margin-top:30px;color:#999;font-size:14px}
        @media(max-width:500px){.features{grid-template-columns:1fr}}
    </style>
</head>
<body>
<div class="card">
    <div class="logo">✂️</div>
    <h1>MyCut</h1>
    <div class="subtitle">המערכת החכמה לניהול תורים</div>
    
    <div class="features">
        <div class="feature">
            <div class="icon">📅</div>
            <div class="text">קביעת תורים<br>מהירה ונוחה</div>
        </div>
        <div class="feature">
            <div class="icon">📊</div>
            <div class="text">דשבורד ניהול<br>מתקדם</div>
        </div>
        <div class="feature">
            <div class="icon">📱</div>
            <div class="text">עובד על כל<br>המכשירים</div>
        </div>
        <div class="feature">
            <div class="icon">🔒</div>
            <div class="text">מאובטח<br>ובטוח</div>
        </div>
    </div>

    <div class="buttons">
        <a href="login.html" class="btn btn-primary">לכניסת בעל עסק</a>
        <a href="register.html" class="btn btn-outline">הרשמה</a>
    </div>
    
    <div class="footer">© 2026 MyCut - כל הזכויות שמורות</div>
</div>
</body>
</html>
