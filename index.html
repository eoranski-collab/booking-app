<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>מערכת ניהול תורים חכמה</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/main.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #f8fafc; padding: 20px; min-height: 100vh; display: flex; justify-content: center; align-items: center; }
    .container { max-width: 1200px; width: 100%; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 20px 40px -12px rgba(0,0,0,0.1); }
    .hidden { display: none !important; }
    .flex { display: flex; gap: 20px; flex-wrap: wrap; }
    .flex-center { display: flex; justify-content: center; align-items: center; flex-direction: column; }
    .btn { padding: 12px 24px; border: none; border-radius: 12px; font-weight: 700; cursor: pointer; transition: 0.2s; }
    .btn-primary { background: #2563eb; color: white; }
    .btn-success { background: #10b981; color: white; }
    .btn-danger { background: #ef4444; color: white; }
    .btn-outline { background: white; border: 1px solid #cbd5e1; color: #1e293b; }
    .btn-primary:hover { background: #1d4ed8; transform: scale(1.02); }
    .card { background: #f8fafc; padding: 20px; border-radius: 16px; border: 1px solid #e2e8f0; margin-bottom: 20px; }
    input, select { width: 100%; padding: 12px; border: 1px solid #cbd5e1; border-radius: 10px; font-size: 16px; }
    label { font-weight: 700; color: #334155; display: block; margin-bottom: 6px; margin-top: 12px; }
    table { width: 100%; border-collapse: collapse; text-align: right; }
    th { background: #f1f5f9; padding: 12px; }
    td { padding: 12px; border-bottom: 1px solid #e2e8f0; }
    .badge { background: #eff6ff; color: #2563eb; padding: 4px 12px; border-radius: 20px; font-size: 14px; }
    .grid-2 { display: grid; grid-template-columns: 1fr 2fr; gap: 30px; }
    @media (max-width: 768px) { .grid-2 { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
<div class="container" id="app">

  <!-- ========== 1. מסך התחברות / הרשמה ========== -->
  <div id="authScreen">
    <div class="flex-center" style="max-width:400px; margin:0 auto;">
      <h1>📅 מערכת ניהול תורים</h1>
      <p style="color:#64748b;">התחבר או פתח עסק חדש</p>
      <div id="authError" style="color:red; margin:10px 0;"></div>
      
      <input type="text" id="authPhone" placeholder="טלפון נייד" style="margin-bottom:10px;">
      <input type="password" id="authPassword" placeholder="סיסמה" style="margin-bottom:10px;">
      <div id="registerFields" class="hidden">
        <input type="text" id="authName" placeholder="שם העסק" style="margin-bottom:10px;">
      </div>
      
      <div style="display:flex; gap:10px; width:100%;">
        <button class="btn btn-primary" id="loginBtn" style="flex:1;">🔑 התחבר</button>
        <button class="btn btn-outline" id="registerBtn" style="flex:1;">🚀 הרשם</button>
      </div>
      <p style="margin-top:15px; font-size:14px; color:#64748b;" id="toggleAuthText">עסק חדש? לחץ על הרשם</p>
    </div>
  </div>

  <!-- ========== 2. לוח בקרה למנהל (אדמין) ========== -->
  <div id="adminScreen" class="hidden">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
      <h2>👋 שלום, <span id="adminBusinessName">טוען...</span></h2>
      <button class="btn btn-danger" id="logoutBtn">🚪 יציאה</button>
    </div>

    <!-- טבלת ניהול תורים ממתינים -->
    <div class="card">
      <h3>📥 בקשות תורים חדשות <span id="pendingCount" class="badge">0</span></h3>
      <div id="pendingTableWrapper"><p>אין תורים ממתינים.</p></div>
    </div>

    <!-- אזור הגדרות + יומן -->
    <div class="grid-2">
      <!-- טור שמאלי: הגדרות -->
      <div class="card">
        <h3>⚙️ הגדרות עסק</h3>
        <label>שם העסק</label>
        <input type="text" id="settingsBusinessName" placeholder="שם העסק">
        
        <label>שם העובד הראשי</label>
        <input type="text" id="settingsStaffName" placeholder="שם העובד">

        <label>📋 ניהול שירותים (מחירון)</label>
        <div id="servicesContainer"></div>
        <button class="btn btn-outline" id="addServiceBtn" style="width:100%; margin-top:10px;">➕ הוסף שירות</button>

        <hr style="margin:20px 0;">
        <label>🕒 שעות פעילות שבועיות</label>
        <div id="daysContainer"></div>

        <button class="btn btn-primary" id="saveSettingsBtn" style="width:100%; margin-top:20px;">💾 שמור הגדרות</button>
        <div id="saveMessage" style="color:green; margin-top:10px;"></div>
        <div style="margin-top:15px; background:#f1f5f9; padding:10px; border-radius:8px;">
          🔗 קישור ללקוחות: <span id="customerLink" style="color:#2563eb; font-weight:bold;"></span>
        </div>
      </div>

      <!-- טור ימני: יומן חזותי -->
      <div class="card" style="direction:ltr;">
        <div id="calendar"></div>
      </div>
    </div>
  </div>

  <!-- ========== 3. מסך לקוח (קביעת תור) ========== -->
  <div id="customerScreen" class="hidden">
    <div style="max-width:500px; margin:0 auto;">
      <h2>📅 קביעת תור</h2>
      <p id="customerBusinessName" style="color:#475569;"></p>
      <hr>
      <div id="customerError" style="color:red;"></div>
      
      <label>שם מלא</label>
      <input type="text" id="custName" placeholder="השם שלך">
      
      <label>טלפון</label>
      <input type="text" id="custPhone" placeholder="טלפון נייד">

      <label>בחר שירות</label>
      <div id="custServices"></div>

      <label>בחר תאריך</label>
      <input type="date" id="custDate">

      <label>בחר שעה</label>
      <div id="custSlots" style="display:flex; flex-wrap:wrap; gap:10px; margin-top:10px;"></div>

      <button class="btn btn-success" id="bookAppointmentBtn" style="width:100%; margin-top:20px;">✅ קבע תור</button>
      <div id="bookingMessage" style="color:green; margin-top:15px;"></div>
    </div>
  </div>
</div>

<script>
  // ============================
  // 1. התחברות ל-Supabase
  // ============================
  const SUPABASE_URL =  'https://bcbnvtszkfjhfujnxldm.supabase.com';  // <-- החלף כאן!
  const SUPABASE_ANON_KEY ='sb_publishable_IzFYbwo2gI65OvmBM53-5g_lAffckNt'; // <-- החלף כאן!
  const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  // ============================
  // 2. מצב גלובלי
  // ============================
  let currentUser = null;
  let currentBusiness = null;
  let currentStaffId = null;
  let allServices = [];
  let allAppointments = [];
  let daysOfWeek = {
    sunday: { active: true, start: "09:00", end: "17:00", label: "יום ראשון" },
    monday: { active: true, start: "09:00", end: "17:00", label: "יום שני" },
    tuesday: { active: true, start: "09:00", end: "17:00", label: "יום שלישי" },
    wednesday: { active: true, start: "09:00", end: "17:00", label: "יום רביעי" },
    thursday: { active: true, start: "09:00", end: "17:00", label: "יום חמישי" },
    friday: { active: false, start: "09:00", end: "13:00", label: "יום שישי" },
    saturday: { active: false, start: "09:00", end: "17:00", label: "יום שבת" }
  };
  let calendar = null;

  // ============================
  // 3. פונקציות עזר (UI)
  // ============================
  function showScreen(screenId) {
    document.getElementById('authScreen').classList.add('hidden');
    document.getElementById('adminScreen').classList.add('hidden');
    document.getElementById('customerScreen').classList.add('hidden');
    document.getElementById(screenId).classList.remove('hidden');
  }

  function getElement(id) { return document.getElementById(id); }

  // ============================
  // 4. ניהול אוטומציה (Auth)
  // ============================
  getElement('loginBtn').addEventListener('click', async () => {
    const phone = getElement('authPhone').value.trim();
    const password = getElement('authPassword').value.trim();
    const errorEl = getElement('authError');
    errorEl.textContent = '';
    if (!phone || !password) { errorEl.textContent = 'נא למלא טלפון וסיסמה'; return; }
    const { data, error } = await supabase.auth.signInWithPassword({ email: phone + '@temp.com', password });
    if (error) { errorEl.textContent = 'פרטים שגויים או משתמש לא קיים'; return; }
    currentUser = data.user;
    await loadBusinessData(data.user.id);
  });

  getElement('registerBtn').addEventListener('click', async () => {
    const phone = getElement('authPhone').value.trim();
    const password = getElement('authPassword').value.trim();
    const name = getElement('authName').value.trim();
    const errorEl = getElement('authError');
    errorEl.textContent = '';
    if (!phone || !password || !name) { errorEl.textContent = 'נא למלא את כל השדות'; return; }
    const { data, error } = await supabase.auth.signUp({ email: phone + '@temp.com', password });
    if (error) { errorEl.textContent = error.message; return; }
    const { error: bizError } = await supabase.from('businesses').insert([{ id: data.user.id, business_name: name, business_phone: phone }]);
    if (bizError) { errorEl.textContent = 'שגיאה ביצירת עסק: ' + bizError.message; return; }
    alert('הרשמה הצליחה! כעת התחבר.');
    getElement('authPassword').value = '';
  });

  getElement('toggleAuthText').addEventListener('click', () => {
    const regFields = getElement('registerFields');
    const text = getElement('toggleAuthText');
    if (regFields.classList.contains('hidden')) {
      regFields.classList.remove('hidden');
      text.textContent = 'כבר רשום? לחץ על התחבר';
    } else {
      regFields.classList.add('hidden');
      text.textContent = 'עסק חדש? לחץ על הרשם';
    }
  });

  getElement('logoutBtn').addEventListener('click', async () => {
    await supabase.auth.signOut();
    currentUser = null;
    showScreen('authScreen');
  });

  // ============================
  // 5. טעינת נתוני עסק
  // ============================
  async function loadBusinessData(userId) {
    const { data: biz, error } = await supabase.from('businesses').select('*').eq('id', userId).single();
    if (error || !biz) { alert('לא נמצא עסק. נא להירשם.'); return; }
    currentBusiness = biz;
    getElement('adminBusinessName').textContent = biz.business_name;
    getElement('settingsBusinessName').value = biz.business_name;
    const { data: svc } = await supabase.from('services').select('*').eq('business_id', userId);
    allServices = svc || [];
    renderServices();
    const { data: staffData } = await supabase.from('staff').select('*').eq('business_id', userId);
    if (staffData && staffData.length > 0) {
      currentStaffId = staffData[0].id;
      getElement('settingsStaffName').value = staffData[0].name;
      if (staffData[0].days) daysOfWeek = { ...daysOfWeek, ...staffData[0].days };
    } else {
      const { data: newStaff } = await supabase.from('staff').insert([{ business_id: userId, name: 'יוסי המנהל', days: daysOfWeek }]).select();
      if (newStaff) currentStaffId = newStaff[0].id;
    }
    renderDays();
    loadAppointments();
    showScreen('adminScreen');
    initCalendar();
    updateCustomerLink();
  }

  // ============================
  // 6. ניהול שירותים (UI)
  // ============================
  function renderServices() {
    const container = getElement('servicesContainer');
    container.innerHTML = '';
    allServices.forEach((svc, idx) => {
      const div = document.createElement('div');
      div.style.cssText = 'display:flex; gap:8px; margin-bottom:8px; align-items:center;';
      div.innerHTML = `
        <input type="text" value="${svc.name}" placeholder="שם" data-idx="${idx}" class="svc-name" style="flex:2; padding:8px; border-radius:6px; border:1px solid #cbd5e1;">
        <input type="number" value="${svc.duration}" placeholder="דקות" data-idx="${idx}" class="svc-duration" style="width:60px; padding:8px; border-radius:6px; border:1px solid #cbd5e1;">
        <input type="number" value="${svc.price}" placeholder="₪" data-idx="${idx}" class="svc-price" style="width:70px; padding:8px; border-radius:6px; border:1px solid #cbd5e1;">
        <button class="btn btn-danger" style="padding:6px 12px;" onclick="removeService(${svc.id})">✕</button>
      `;
      container.appendChild(div);
    });
  }

  window.removeService = async (id) => {
    await supabase.from('services').delete().eq('id', id);
    allServices = allServices.filter(s => s.id !== id);
    renderServices();
  };

  getElement('addServiceBtn').addEventListener('click', async () => {
    const newSvc = { business_id: currentUser.id, name: 'שירות חדש', duration: 30, price: 50 };
    const { data, error } = await supabase.from('services').insert([newSvc]).select();
    if (!error && data) {
      allServices.push(data[0]);
      renderServices();
    }
  });

  // ============================
  // 7. ניהול ימי עבודה (UI)
  // ============================
  function renderDays() {
    const container = getElement('daysContainer');
    container.innerHTML = '';
    Object.keys(daysOfWeek).forEach(key => {
      const d = daysOfWeek[key];
      const div = document.createElement('div');
      div.style.cssText = 'display:flex; align-items:center; gap:10px; margin-bottom:8px;';
      div.innerHTML = `
        <input type="checkbox" ${d.active ? 'checked' : ''} data-key="${key}" class="day-check">
        <span style="width:80px;">${d.label}</span>
        <input type="time" value="${d.start}" data-key="${key}" class="day-start" style="padding:4px; border:1px solid #cbd5e1; border-radius:4px;">
        <input type="time" value="${d.end}" data-key="${key}" class="day-end" style="padding:4px; border:1px solid #cbd5e1; border-radius:4px;">
      `;
      container.appendChild(div);
    });
  }

  // ============================
  // 8. טעינת תורים + יומן
  // ============================
  async function loadAppointments() {
    if (!currentUser) return;
    const { data } = await supabase.from('appointments').select('*').eq('business_id', currentUser.id);
    allAppointments = data || [];
    renderPendingTable();
    updateCalendarEvents();
  }

  function renderPendingTable() {
    const pending = allAppointments.filter(a => a.status === 'pending');
    const wrapper = getElement('pendingTableWrapper');
    getElement('pendingCount').textContent = pending.length;
    if (pending.length === 0) { wrapper.innerHTML = '<p>אין תורים ממתינים.</p>'; return; }
    let html = `<table><thead><tr><th>לקוח</th><th>טלפון</th><th>שירות</th><th>תאריך</th><th>פעולות</th></tr></thead><tbody>`;
    pending.forEach(a => {
      const dateStr = new Date(a.date_time).toLocaleString('he-IL');
      html += `<tr>
        <td>${a.customer_name}</td>
        <td>${a.customer_phone}</td>
        <td><span class="badge">${a.service_name}</span></td>
        <td>${dateStr}</td>
        <td>
          <button class="btn btn-success" style="padding:4px 12px; margin-left:5px;" onclick="updateAppointmentStatus(${a.id}, 'approved')">✔ אישור</button>
          <button class="btn btn-danger" style="padding:4px 12px;" onclick="updateAppointmentStatus(${a.id}, 'rejected')">✖ דחייה</button>
        </td>
      </tr>`;
    });
    html += '</tbody></table>';
    wrapper.innerHTML = html;
  }

  window.updateAppointmentStatus = async (id, status) => {
    await supabase.from('appointments').update({ status }).eq('id', id);
    loadAppointments();
  };

  // ============================
  // 9. יומן (FullCalendar)
  // ============================
  function initCalendar() {
    const el = document.getElementById('calendar');
    calendar = new FullCalendar.Calendar(el, {
      initialView: 'timeGridWeek',
      locale: 'he',
      slotMinTime: '07:00:00',
      slotMaxTime: '21:00:00',
      allDaySlot: false,
      headerToolbar: { left: 'prev,next today', center: 'title', right: 'timeGridWeek,timeGridDay' },
      events: []
    });
    calendar.render();
    updateCalendarEvents();
  }

  function updateCalendarEvents() {
    if (!calendar) return;
    const events = allAppointments.filter(a => a.status !== 'rejected').map(a => ({
      title: `${a.customer_name} - ${a.service_name}`,
      start: a.date_time,
      backgroundColor: a.status === 'approved' ? '#10b981' : '#f59e0b'
    }));
    calendar.removeAllEvents();
    calendar.addEventSource(events);
  }

  // ============================
  // 10. שמירת הגדרות
  // ============================
  getElement('saveSettingsBtn').addEventListener('click', async () => {
    const bizName = getElement('settingsBusinessName').value;
    const staffName = getElement('settingsStaffName').value;
    await supabase.from('businesses').update({ business_name: bizName }).eq('id', currentUser.id);
    
    const checkboxes = document.querySelectorAll('.day-check');
    const starts = document.querySelectorAll('.day-start');
    const ends = document.querySelectorAll('.day-end');
    const days = {};
    checkboxes.forEach((cb, i) => {
      const key = cb.dataset.key;
      days[key] = { active: cb.checked, start: starts[i].value, end: ends[i].value, label: daysOfWeek[key].label };
    });
    daysOfWeek = days;

    const nameInputs = document.querySelectorAll('.svc-name');
    const durInputs = document.querySelectorAll('.svc-duration');
    const priceInputs = document.querySelectorAll('.svc-price');
    for (let i = 0; i < nameInputs.length; i++) {
      const idx = parseInt(nameInputs[i].dataset.idx);
      const svc = allServices.find(s => s.id === parseInt(allServices[i]?.id)) || allServices[i];
      if (svc) {
        await supabase.from('services').update({ 
          name: nameInputs[i].value, 
          duration: parseInt(durInputs[i].value), 
          price: parseInt(priceInputs[i].value) 
        }).eq('id', svc.id);
      }
    }

    await supabase.from('staff').update({ name: staffName, days: daysOfWeek }).eq('id', currentStaffId);
    
    getElement('saveMessage').textContent = '✅ ההגדרות נשמרו בהצלחה!';
    setTimeout(() => getElement('saveMessage').textContent = '', 3000);
    loadAppointments();
    updateCustomerLink();
  });

  function updateCustomerLink() {
    const base = window.location.origin + window.location.pathname;
    getElement('customerLink').textContent = `${base}?phone=${currentBusiness.business_phone}`;
  }

  // ============================
  // 11. מסך לקוח (קביעת תור)
  // ============================
  window.addEventListener('DOMContentLoaded', async () => {
    const params = new URLSearchParams(window.location.search);
    const phone = params.get('phone');
    if (phone) {
      showScreen('customerScreen');
      await loadCustomerData(phone);
    } else {
      const { data } = await supabase.auth.getSession();
      if (data.session) {
        currentUser = data.session.user;
        await loadBusinessData(currentUser.id);
      } else {
        showScreen('authScreen');
      }
    }
  });

  async function loadCustomerData(phone) {
    const { data: biz, error } = await supabase.from('businesses').select('*').eq('business_phone', phone).single();
    if (error || !biz) { getElement('customerError').textContent = 'עסק לא נמצא'; return; }
    getElement('customerBusinessName').textContent = `ברוכים הבאים ל-${biz.business_name}`;
    const { data: svc } = await supabase.from('services').select('*').eq('business_id', biz.id);
    const container = getElement('custServices');
    container.innerHTML = '';
    svc.forEach(s => {
      const btn = document.createElement('button');
      btn.className = 'btn btn-outline';
      btn.style.cssText = 'margin:5px; width:100%; text-align:right;';
      btn.textContent = `${s.name} (${s.duration} דקות, ₪${s.price})`;
      btn.dataset.id = s.id;
      btn.onclick = () => {
        document.querySelectorAll('#custServices .btn').forEach(b => b.style.background = '#fff');
        btn.style.background = '#dbeafe';
        window.selectedService = s;
      };
      container.appendChild(btn);
    });
  }

  getElement('custDate').addEventListener('change', async (e) => {
    const date = e.target.value;
    if (!window.selectedService) { alert('בחר שירות קודם'); return; }
    const params = new URLSearchParams(window.location.search);
    const phone = params.get('phone');
    const { data: biz } = await supabase.from('businesses').select('id').eq('business_phone', phone).single();
    if (!biz) return;
    const { data: staff } = await supabase.from('staff').select('*').eq('business_id', biz.id).single();
    if (!staff) return;
    const dayName = ['sunday','monday','tuesday','wednesday','thursday','friday','saturday'][new Date(date).getDay()];
    const dayConfig = staff.days[dayName];
    if (!dayConfig || !dayConfig.active) { getElement('custSlots').innerHTML = '<p>לא עובד ביום זה</p>'; return; }
    const { data: appts } = await supabase.from('appointments').select('*').eq('staff_id', staff.id).like('date_time', `${date}%`);
    const busySlots = appts.map(a => a.date_time.split('T')[1].slice(0,5));
    const startMin = timeToMinutes(dayConfig.start);
    const endMin = timeToMinutes(dayConfig.end);
    const duration = window.selectedService.duration;
    const slots = [];
    for (let t = startMin; t + duration <= endMin; t += 30) {
      const h = String(Math.floor(t/60)).padStart(2,'0');
      const m = String(t%60).padStart(2,'0');
      const slot = `${h}:${m}`;
      if (!busySlots.includes(slot)) slots.push(slot);
    }
    const container = getElement('custSlots');
    container.innerHTML = '';
    slots.forEach(s => {
      const btn = document.createElement('button');
      btn.className = 'btn btn-outline';
      btn.textContent = s;
      btn.onclick = () => {
        document.querySelectorAll('#custSlots .btn').forEach(b => b.style.background = '#fff');
        btn.style.background = '#dbeafe';
        window.selectedSlot = s;
      };
      container.appendChild(btn);
    });
  });

  function timeToMinutes(str) {
    const [h,m] = str.split(':').map(Number);
    return h*60+m;
  }

  getElement('bookAppointmentBtn').addEventListener('click', async () => {
    const name = getElement('custName').value.trim();
    const phone = getElement('custPhone').value.trim();
    const date = getElement('custDate').value;
    if (!name || !phone || !date || !window.selectedService || !window.selectedSlot) {
      alert('נא למלא כל הפרטים ולבחור שירות, תאריך ושעה');
      return;
    }
    const params = new URLSearchParams(window.location.search);
    const businessPhone = params.get('phone');
    const { data: biz } = await supabase.from('businesses').select('id').eq('business_phone', businessPhone).single();
    const { data: staff } = await supabase.from('staff').select('id').eq('business_id', biz.id).single();
    const dateTime = `${date}T${window.selectedSlot}`;
    const { error } = await supabase.from('appointments').insert([{
      business_id: biz.id,
      staff_id: staff.id,
      service_name: window.selectedService.name,
      duration: window.selectedService.duration,
      customer_name: name,
      customer_phone: phone,
      date_time: dateTime,
      status: 'pending'
    }]);
    if (error) { alert('שגיאה: ' + error.message); return; }
    getElement('bookingMessage').textContent = '✅ התור נשלח לאישור! תקבל הודעה כשבעל העסק יאשר.';
    getElement('custName').value = '';
    getElement('custPhone').value = '';
    getElement('custSlots').innerHTML = '';
  });

  console.log('🚀 מערכת ניהול תורים חכמה על Supabase הופעלה!');
</script>

</body>
</html>
