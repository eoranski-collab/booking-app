<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>התחברות - MyCut</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:Arial,sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
        .card{background:white;border-radius:20px;padding:40px;width:100%;max-width:400px;box-shadow:0 20px 60px rgba(0,0,0,0.3)}
        h1{text-align:center;color:#333;margin-bottom:5px}
        .subtitle{text-align:center;color:#666;margin-bottom:30px}
        .form-group{margin-bottom:15px}
        .form-group label{display:block;font-weight:bold;margin-bottom:5px;color:#333}
        .form-group input{width:100%;padding:12px;border:2px solid #ddd;border-radius:10px;font-size:16px;box-sizing:border-box}
        .form-group input:focus{border-color:#667eea;outline:none}
        .btn{width:100%;padding:14px;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:white;border:none;border-radius:10px;font-size:18px;font-weight:bold;cursor:pointer}
        .btn:hover{transform:translateY(-2px);box-shadow:0 5px 20px rgba(102,126,234,0.4)}
        .btn:disabled{opacity:0.6;cursor:not-allowed}
        .alert{padding:12px;border-radius:10px;margin-bottom:15px;display:none;text-align:center}
        .alert-error{background:#fee;color:#c33;border:1px solid #fcc}
        .alert-success{background:#efe;color:#3c3;border:1px solid #cfc}
        .alert.show{display:block}
        .footer{text-align:center;margin-top:20px;color:#666}
        .footer a{color:#667eea;text-decoration:none;font-weight:bold}
        .spinner{display:inline-block;width:20px;height:20px;border:3px solid rgba(255,255,255,0.3);border-top-color:white;border-radius:50%;animation:spin 0.8s linear infinite;vertical-align:middle;margin-right:10px}
        @keyframes spin{to{transform:rotate(360deg)}}
    </style>
</head>
<body>
<div class="card">
    <h1>✂️ MyCut</h1>
    <div class="subtitle">התחברות לבעל עסק</div>
    
    <div id="alert" class="alert"></div>
    
    <form id="loginForm">
        <div class="form-group">
            <label>אימייל</label>
            <input type="email" id="email" placeholder="הכנס אימייל" required>
        </div>
        <div class="form-group">
            <label>סיסמה</label>
            <input type="password" id="password" placeholder="הכנס סיסמה" required>
        </div>
        <button type="submit" class="btn" id="loginBtn">התחבר</button>
    </form>
    
    <div class="footer">
        אין לך חשבון? <a href="register.html">הרשם עכשיו</a>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    // ============================================
    // כל הקוד עטוף בפונקציה - אין כפילויות!
    // ============================================
    (function() {
        'use strict';
        
        const SUPABASE_URL = 'https://bcbnvtszkfjhfujnxldm.supabase.co';
        const SUPABASE_ANON = 'sb_publishable_IzFYbwo2gI65OvmBM53-5g_lAffckNt';
        const sb = window.supabaseClient.createClient(SUPABASE_URL, SUPABASE_ANON);

        const alertEl = document.getElementById('alert');
        const loginBtn = document.getElementById('loginBtn');

        function showAlert(msg, type = 'error') {
            alertEl.textContent = msg;
            alertEl.className = `alert alert-${type} show`;
        }

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            alertEl.className = 'alert';
            
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;

            if (!email || !password) {
                showAlert('❌ יש למלא את כל השדות', 'error');
                return;
            }

            loginBtn.disabled = true;
            loginBtn.innerHTML = 'מתחבר...';

            try {
                const { data, error } = await sb.auth.signInWithPassword({
                    email: email,
                    password: password
                });

                if (error) throw new Error(error.message);
                if (!data.user) throw new Error('לא נמצא משתמש');

                localStorage.setItem('user', JSON.stringify(data.user));

                const { data: userData } = await sb
                    .from('users')
                    .select('business_id')
                    .eq('id', data.user.id)
                    .single();

                if (userData?.business_id) {
                    const { data: business } = await sb
                        .from('businesses')
                        .select('*')
                        .eq('id', userData.business_id)
                        .single();
                    if (business) {
                        localStorage.setItem('business', JSON.stringify(business));
                    }
                }

                showAlert('✅ התחברת בהצלחה!', 'success');
                setTimeout(() => {
                    window.location.href = 'dashboard.html';
                }, 1000);

            } catch (error) {
                showAlert('❌ ' + error.message, 'error');
                loginBtn.disabled = false;
                loginBtn.innerHTML = 'התחבר';
            }
        });
    })();
</script>
</body>
</html>
