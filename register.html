<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>הרשמה - MyCut</title>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;800;900&display=swap" rel="stylesheet" />
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Heebo',sans-serif;background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;direction:rtl}
        .card{background:rgba(255,255,255,0.05);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,0.1);border-radius:24px;padding:40px;max-width:480px;width:100%;box-shadow:0 30px 80px rgba(0,0,0,0.6)}
        .logo{text-align:center;margin-bottom:24px}
        .logo .icon{font-size:48px;background:linear-gradient(135deg,#f093fb,#f5576c);width:70px;height:70px;line-height:70px;border-radius:20px;display:inline-block;box-shadow:0 12px 40px rgba(245,87,108,0.3)}
        .logo h1{font-size:28px;font-weight:900;color:#fff;margin-top:12px}
        .logo .sub{color:rgba(255,255,255,0.5);font-size:14px;margin-top:4px}
        .form-group{margin-bottom:16px}
        .form-group label{display:block;color:rgba(255,255,255,0.7);font-size:13px;font-weight:500;margin-bottom:4px}
        .form-group label .req{color:#f5576c}
        .form-group input{width:100%;padding:12px 16px;background:rgba(255,255,255,0.07);border:2px solid rgba(255,255,255,0.08);border-radius:12px;color:#fff;font-size:15px;font-family:'Heebo',sans-serif;transition:all 0.3s;outline:none;box-sizing:border-box}
        .form-group input:focus{border-color:#f5576c;background:rgba(255,255,255,0.1);box-shadow:0 0 0 4px rgba(245,87,108,0.1)}
        .form-group input::placeholder{color:rgba(255,255,255,0.3)}
        .form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
        @media(max-width:480px){.form-row{grid-template-columns:1fr}}
        .btn{width:100%;padding:14px;background:linear-gradient(135deg,#f093fb,#f5576c);color:#fff;border:none;border-radius:12px;font-size:18px;font-weight:700;cursor:pointer;transition:all 0.3s;box-shadow:0 8px 30px rgba(245,87,108,0.3);font-family:'Heebo',sans-serif}
        .btn:hover{transform:translateY(-2px);box-shadow:0 12px 40px rgba(245,87,108,0.5)}
        .btn:disabled{opacity:0.6;cursor:not-allowed;transform:none}
        .alert{padding:12px 16px;border-radius:12px;margin-bottom:16px;display:none;text-align:center;font-size:14px;font-weight:500}
        .alert.show{display:block}
        .alert-error{background:rgba(245,87,108,0.15);border:1px solid rgba(245,87,108,0.2);color:#f5576c}
        .alert-success{background:rgba(72,187,120,0.15);border:1px solid rgba(72,187,120,0.2);color:#48bb78}
        .spinner{display:inline-block;width:20px;height:20px;border:2px solid rgba(255,255,255,0.3);border-top-color:#fff;border-radius:50%;animation:spin 0.8s linear infinite;vertical-align:middle;margin-left:8px}
        @keyframes spin{to{transform:rotate(360deg)}}
        .footer{text-align:center;margin-top:20px;color:rgba(255,255,255,0.25);font-size:14px}
        .footer a{color:#f5576c;text-decoration:none;font-weight:600}
        .footer a:hover{text-decoration:underline}
        .back-link{display:inline-block;color:rgba(255,255,255,0.4);text-decoration:none;font-size:14px;margin-bottom:16px;transition:color 0.3s}
        .back-link:hover{color:#fff}
        .back-link i{margin-left:6px}
        .password-strength{height:3px;margin-top:6px;border-radius:4px;background:rgba(255,255,255,0.08);overflow:hidden}
        .password-strength .bar{height:100%;border-radius:4px;transition:all 0.4s ease;width:0%}
    </style>
</head>
<body>
<div class="card">
    <a href="index.html" class="back-link"><i class="fas fa-arrow-right"></i> חזרה</a>
    
    <div class="logo">
        <div class="icon">✂️</div>
        <h1>MyCut</h1>
        <div class="sub">🚀 פתח עסק חדש</div>
    </div>

    <div id="alert" class="alert"></div>

    <form id="registerForm">
        <div class="form-group">
            <label>שם העסק <span class="req">*</span></label>
            <input type="text" id="businessName" placeholder="למשל: מספרה אופיר" required>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label>שם בעל העסק <span class="req">*</span></label>
                <input type="text" id="ownerName" placeholder="שם מלא" required>
            </div>
            <div class="form-group">
                <label>טלפון <span class="req">*</span></label>
                <input type="tel" id="phone" placeholder="050-1234567" required>
            </div>
        </div>
        <div class="form-group">
            <label>אימייל <span class="req">*</span></label>
            <input type="email" id="email" placeholder="הכנס אימייל" required autocomplete="email">
        </div>
        <div class="form-group">
            <label>סיסמה <span class="req">*</span></label>
            <input type="password" id="password" placeholder="לפחות 6 תווים" required autocomplete="new-password" oninput="updatePasswordStrength(this.value)">
            <div class="password-strength"><div class="bar" id="passwordStrengthBar"></div></div>
        </div>
        <div class="form-group">
            <label>אימות סיסמה <span class="req">*</span></label>
            <input type="password" id="confirmPassword" placeholder="הכנס שוב" required autocomplete="new-password">
        </div>
        
        <button type="submit" class="btn" id="registerBtn">🚀 הרשם עכשיו</button>
    </form>

    <div class="footer">
        כבר יש לך חשבון? <a href="login.html">התחבר</a>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    // ================================================
    // הגדרות
    // ================================================
    const SUPABASE_URL = 'https://bcbnvtszkfjhfujnxldm.supabase.co';
    const SUPABASE_ANON = 'sb_publishable_IzFYbwo2gI65OvmBM53-5g_lAffckNt';
    const { createClient } = supabase;
    const sb = createClient(SUPABASE_URL, SUPABASE_ANON);

    const alertEl = document.getElementById('alert');
    const registerBtn = document.getElementById('registerBtn');

    function showAlert(msg, type = 'error') {
        alertEl.textContent = msg;
        alertEl.className = `alert alert-${type} show`;
        console.log('📢', msg);
    }

    function updatePasswordStrength(password) {
        const bar = document.getElementById('passwordStrengthBar');
        let strength = 0;
        if (password.length >= 6) strength += 20;
        if (password.length >= 10) strength += 20;
        if (/[a-z]/.test(password) && /[A-Z]/.test(password)) strength += 20;
        if (/\d/.test(password)) strength += 20;
        if (/[^a-zA-Z0-9]/.test(password)) strength += 20;
        bar.style.width = strength + '%';
        if (strength < 40) bar.style.background = '#f5576c';
        else if (strength < 70) bar.style.background = '#f6ad55';
        else bar.style.background = '#48bb78';
    }

    // ===== הרשמה =====
    document.getElementById('registerForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        alertEl.className = 'alert';
        
        const businessName = document.getElementById('businessName').value.trim();
        const ownerName = document.getElementById('ownerName').value.trim();
        const phone = document.getElementById('phone').value.trim();
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        const confirmPassword = document.getElementById('confirmPassword').value;

        if (!businessName || !ownerName || !phone || !email || !password) {
            showAlert('❌ יש למלא את כל השדות', 'error');
            return;
        }
        if (password !== confirmPassword) {
            showAlert('❌ הסיסמאות אינן תואמות', 'error');
            return;
        }
        if (password.length < 6) {
            showAlert('❌ הסיסמה חייבת להיות לפחות 6 תווים', 'error');
            return;
        }

        registerBtn.disabled = true;
        registerBtn.innerHTML = 'יוצר חשבון <span class="spinner"></span>';

        try {
            // 1. הרשמה
            const { data: authData, error: authError } = await sb.auth.signUp({
                email: email,
                password: password
            });

            if (authError) {
                if (authError.message.includes('already registered')) {
                    showAlert('❌ אימייל זה כבר רשום. נסה להתחבר.', 'error');
                } else {
                    showAlert('❌ שגיאת אימות: ' + authError.message, 'error');
                }
                registerBtn.disabled = false;
                registerBtn.innerHTML = '🚀 הרשם עכשיו';
                return;
            }

            if (!authData.user) {
                showAlert('❌ שגיאה ביצירת המשתמש. נסה שוב.', 'error');
                registerBtn.disabled = false;
                registerBtn.innerHTML = '🚀 הרשם עכשיו';
                return;
            }

            console.log('✅ משתמש נוצר:', authData.user.id);

            // 2. יצירת עסק
            const { data: business, error: bizError } = await sb
                .from('businesses')
                .insert([{
                    name: businessName,
                    owner_name: ownerName,
                    email: email,
                    phone: phone
                }])
                .select()
                .single();

            if (bizError) {
                console.error('❌ שגיאת עסק:', bizError);
                await sb.auth.signOut();
                showAlert('❌ שגיאה ביצירת העסק: ' + bizError.message, 'error');
                registerBtn.disabled = false;
                registerBtn.innerHTML = '🚀 הרשם עכשיו';
                return;
            }

            console.log('✅ עסק נוצר:', business.id);

            // 3. קישור משתמש לעסק
            const { error: userError } = await sb
                .from('users')
                .insert([{
                    id: authData.user.id,
                    business_id: business.id,
                    email: email,
                    full_name: ownerName,
                    role: 'owner'
                }]);

            if (userError) {
                console.error('❌ שגיאת משתמש:', userError);
                await sb.from('businesses').delete().eq('id', business.id);
                await sb.auth.signOut();
                showAlert('❌ שגיאה בקישור המשתמש: ' + userError.message, 'error');
                registerBtn.disabled = false;
                registerBtn.innerHTML = '🚀 הרשם עכשיו';
                return;
            }

            console.log('✅ הכול עובד!');

            // ================================================
            // ✅ חשוב: מתנתקים מהמשתמש הישן ומתחברים עם החדש
            // ================================================
            await sb.auth.signOut();
            localStorage.clear();

            // מתחברים עם המשתמש החדש
            await sb.auth.signInWithPassword({
                email: email,
                password: password
            });

            localStorage.setItem('user', JSON.stringify(authData.user));
            localStorage.setItem('business', JSON.stringify(business));

            showAlert('🎉 העסק נוצר בהצלחה!', 'success');
            
            setTimeout(() => {
                window.location.href = 'dashboard.html';
            }, 1500);

        } catch (error) {
            console.error('❌ שגיאה:', error);
            showAlert('❌ ' + error.message, 'error');
            registerBtn.disabled = false;
            registerBtn.innerHTML = '🚀 הרשם עכשיו';
        }
    });

    // ================================================
    // ❌ לא מפנים אוטומטית - נשארים בדף
    // ================================================
    document.addEventListener('DOMContentLoaded', () => {
        console.log('📝 דף הרשמה נטען');
    });

    document.querySelectorAll('.form-group input').forEach(input => {
        input.addEventListener('input', () => {
            alertEl.className = 'alert';
        });
    });
</script>
</body>
</html>
