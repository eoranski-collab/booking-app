<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>הרשמה - MyCut</title>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;800;900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Heebo', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            padding: 20px;
            direction: rtl;
        }

        .register-wrapper {
            width: 100%;
            max-width: 500px;
        }

        .register-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 32px;
            padding: 48px 40px;
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.6);
            transition: all 0.3s ease;
        }

        .register-card:hover {
            border-color: rgba(255, 255, 255, 0.2);
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.8);
        }

        /* ===== לוגו ===== */
        .logo-section {
            text-align: center;
            margin-bottom: 32px;
        }

        .logo-icon {
            display: inline-block;
            font-size: 48px;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            width: 80px;
            height: 80px;
            line-height: 80px;
            border-radius: 24px;
            margin-bottom: 12px;
            box-shadow: 0 12px 40px rgba(245, 87, 108, 0.4);
        }

        .logo-section h1 {
            font-size: 28px;
            font-weight: 900;
            color: #fff;
            letter-spacing: -0.5px;
        }

        .logo-section .subtitle {
            color: rgba(255, 255, 255, 0.6);
            font-size: 14px;
            font-weight: 400;
            margin-top: 4px;
        }

        /* ===== הודעות ===== */
        .alert {
            padding: 14px 18px;
            border-radius: 14px;
            margin-bottom: 20px;
            display: none;
            font-size: 14px;
            font-weight: 500;
        }

        .alert.show {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .alert-error {
            background: rgba(245, 87, 108, 0.2);
            border: 1px solid rgba(245, 87, 108, 0.3);
            color: #f5576c;
        }

        .alert-success {
            background: rgba(72, 187, 120, 0.2);
            border: 1px solid rgba(72, 187, 120, 0.3);
            color: #48bb78;
        }

        .alert i {
            font-size: 18px;
        }

        /* ===== שדות ===== */
        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            color: rgba(255, 255, 255, 0.8);
            font-size: 13px;
            font-weight: 500;
            margin-bottom: 5px;
        }

        .form-group label .required {
            color: #f5576c;
            margin-right: 2px;
        }

        .form-group .input-wrapper {
            position: relative;
        }

        .form-group .input-wrapper i {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255, 255, 255, 0.3);
            font-size: 16px;
            transition: color 0.3s ease;
        }

        .form-group .input-wrapper input {
            width: 100%;
            padding: 14px 46px 14px 16px;
            background: rgba(255, 255, 255, 0.07);
            border: 2px solid rgba(255, 255, 255, 0.08);
            border-radius: 14px;
            color: #fff;
            font-size: 15px;
            font-family: 'Heebo', sans-serif;
            transition: all 0.3s ease;
            outline: none;
            direction: rtl;
        }

        .form-group .input-wrapper input::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }

        .form-group .input-wrapper input:focus {
            border-color: #f5576c;
            background: rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 0 4px rgba(245, 87, 108, 0.15);
        }

        .form-group .input-wrapper input:focus + i {
            color: #f5576c;
        }

        .form-group .input-wrapper input.error {
            border-color: #f5576c;
            background: rgba(245, 87, 108, 0.1);
        }

        .form-group .input-wrapper .toggle-password {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.3);
            cursor: pointer;
            font-size: 16px;
            transition: color 0.3s ease;
            padding: 0;
        }

        .form-group .input-wrapper .toggle-password:hover {
            color: rgba(255, 255, 255, 0.7);
        }

        .error-msg {
            color: #f5576c;
            font-size: 12px;
            font-weight: 500;
            margin-top: 4px;
            display: none;
        }

        .error-msg.show {
            display: block;
        }

        /* ===== שורה עם 2 עמודות ===== */
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        @media (max-width: 480px) {
            .form-row {
                grid-template-columns: 1fr;
            }
        }

        /* ===== סיסמה - חוזק ===== */
        .password-strength {
            height: 3px;
            margin-top: 8px;
            border-radius: 4px;
            background: rgba(255, 255, 255, 0.08);
            overflow: hidden;
        }

        .password-strength .bar {
            height: 100%;
            border-radius: 4px;
            transition: all 0.4s ease;
            width: 0%;
        }

        /* ===== כפתור ===== */
        .btn-register {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: #fff;
            border: none;
            border-radius: 14px;
            font-size: 18px;
            font-weight: 700;
            font-family: 'Heebo', sans-serif;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 8px 30px rgba(245, 87, 108, 0.35);
            margin-top: 8px;
        }

        .btn-register:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 40px rgba(245, 87, 108, 0.5);
        }

        .btn-register:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .btn-register .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            vertical-align: middle;
            margin-right: 10px;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* ===== תחתית ===== */
        .footer {
            text-align: center;
            margin-top: 24px;
            color: rgba(255, 255, 255, 0.4);
            font-size: 14px;
        }

        .footer a {
            color: #f5576c;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s ease;
        }

        .footer a:hover {
            color: #f093fb;
            text-decoration: underline;
        }

        /* ===== תפריט ===== */
        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: rgba(255, 255, 255, 0.4);
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            transition: color 0.3s ease;
            margin-bottom: 20px;
        }

        .back-link:hover {
            color: #fff;
        }

        .back-link i {
            font-size: 14px;
        }

        /* ===== סמלי מדיה ===== */
        .social-divider {
            display: flex;
            align-items: center;
            gap: 16px;
            margin: 20px 0 8px 0;
        }

        .social-divider::before,
        .social-divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: rgba(255, 255, 255, 0.08);
        }

        .social-divider span {
            color: rgba(255, 255, 255, 0.3);
            font-size: 12px;
            font-weight: 400;
            white-space: nowrap;
        }
    </style>
</head>
<body>

    <div class="register-wrapper">
        <div class="register-card">

            <!-- כפתור חזרה -->
            <a href="index.html" class="back-link">
                <i class="fas fa-arrow-right"></i> חזרה לדף הבית
            </a>

            <!-- לוגו -->
            <div class="logo-section">
                <div class="logo-icon">✂️</div>
                <h1>MyCut</h1>
                <div class="subtitle">🚀 פתח עסק חדש והתחל לקבוע תורים</div>
            </div>

            <!-- הודעות -->
            <div id="alert" class="alert"></div>

            <!-- טופס -->
            <form id="registerForm">

                <!-- שם העסק -->
                <div class="form-group">
                    <label>שם העסק <span class="required">*</span></label>
                    <div class="input-wrapper">
                        <input type="text" id="businessName" placeholder="למשל: מספרה אופיר" required />
                        <i class="fas fa-store"></i>
                    </div>
                    <div id="businessNameError" class="error-msg"></div>
                </div>

                <!-- שורה: שם בעל עסק + טלפון -->
                <div class="form-row">
                    <div class="form-group">
                        <label>שם בעל העסק <span class="required">*</span></label>
                        <div class="input-wrapper">
                            <input type="text" id="ownerName" placeholder="שם מלא" required />
                            <i class="fas fa-user"></i>
                        </div>
                        <div id="ownerNameError" class="error-msg"></div>
                    </div>
                    <div class="form-group">
                        <label>טלפון <span class="required">*</span></label>
                        <div class="input-wrapper">
                            <input type="tel" id="phone" placeholder="050-1234567" required />
                            <i class="fas fa-phone"></i>
                        </div>
                        <div id="phoneError" class="error-msg"></div>
                    </div>
                </div>

                <!-- אימייל -->
                <div class="form-group">
                    <label>אימייל <span class="required">*</span></label>
                    <div class="input-wrapper">
                        <input type="email" id="email" placeholder="הכנס את כתובת האימייל שלך" required autocomplete="email" />
                        <i class="fas fa-envelope"></i>
                    </div>
                    <div id="emailError" class="error-msg"></div>
                </div>

                <!-- סיסמה + אימות -->
                <div class="form-row">
                    <div class="form-group">
                        <label>סיסמה <span class="required">*</span></label>
                        <div class="input-wrapper">
                            <input type="password" id="password" placeholder="לפחות 6 תווים" required autocomplete="new-password" oninput="updatePasswordStrength(this.value)" />
                            <i class="fas fa-lock"></i>
                            <button type="button" class="toggle-password" onclick="togglePassword('password', this)">👁️</button>
                        </div>
                        <div class="password-strength">
                            <div class="bar" id="passwordStrengthBar"></div>
                        </div>
                        <div id="passwordError" class="error-msg"></div>
                    </div>
                    <div class="form-group">
                        <label>אימות סיסמה <span class="required">*</span></label>
                        <div class="input-wrapper">
                            <input type="password" id="confirmPassword" placeholder="הכנס שוב" required autocomplete="new-password" />
                            <i class="fas fa-check-circle"></i>
                            <button type="button" class="toggle-password" onclick="togglePassword('confirmPassword', this)">👁️</button>
                        </div>
                        <div id="confirmPasswordError" class="error-msg"></div>
                    </div>
                </div>

                <!-- כפתור -->
                <button type="submit" class="btn-register" id="registerBtn">
                    🚀 הרשם עכשיו
                </button>
            </form>

            <!-- קישור להתחברות -->
            <div class="footer">
                כבר יש לך חשבון? <a href="login.html">התחבר</a>
            </div>

            <!-- קו מפריד -->
            <div class="social-divider">
                <span>✨ הצטרף לעשרות עסקים</span>
            </div>

        </div>
    </div>

    <!-- ============================================ -->
    <!-- Supabase                                      -->
    <!-- ============================================ -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2">
    </script>

    <script>
        // ============================================
        // Supabase
        // ============================================
        const SUPABASE_URL = 'https://bcbnvtszkfjhfujnxldm.supabase.co';
        const SUPABASE_ANON = 'sb_publishable_IzFYbwo2gI65OvmBM53-5g_lAffckNt';
        const { createClient } = supabase;
        const sb = createClient(SUPABASE_URL, SUPABASE_ANON);

        // ============================================
        // משתנים
        // ============================================
        const alertEl = document.getElementById('alert');
        const registerBtn = document.getElementById('registerBtn');

        // ============================================
        // פונקציות עזר
        // ============================================
        function showAlert(msg, type = 'error') {
            alertEl.innerHTML = `<i class="fas fa-${type === 'success' ? 'check-circle' : 'exclamation-circle'}"></i> ${msg}`;
            alertEl.className = `alert alert-${type} show`;
        }

        function hideAlert() {
            alertEl.className = 'alert';
        }

        function showFieldError(fieldId, msg) {
            const errorEl = document.getElementById(fieldId + 'Error');
            const input = document.getElementById(fieldId);
            if (errorEl) {
                errorEl.textContent = msg;
                errorEl.className = 'error-msg show';
            }
            if (input) {
                input.className = 'error';
            }
        }

        function clearFieldErrors() {
            document.querySelectorAll('.error-msg').forEach(el => el.className = 'error-msg');
            document.querySelectorAll('.form-group .input-wrapper input').forEach(el => el.className = '');
        }

        function togglePassword(fieldId, btn) {
            const input = document.getElementById(fieldId);
            if (input.type === 'password') {
                input.type = 'text';
                btn.textContent = '🙈';
            } else {
                input.type = 'password';
                btn.textContent = '👁️';
            }
        }

        function updatePasswordStrength(password) {
            const bar = document.getElementById('passwordStrengthBar');
            let strength = 0;
            if (password.length >= 6) strength += 20;
            if (password.length >= 10) strength += 20;
            if (/[a-z]/.test(password) && /[A-Z]/.test(password)) strength += 20;
            if (/\d/.test(password)) strength += 20;
            if (/[^a-zA-Z0-9]/.test(password)) strength += 20;

            bar.style.width = strength + '%';
            if (strength < 40) {
                bar.style.background = '#f5576c';
            } else if (strength < 70) {
                bar.style.background = '#f6ad55';
            } else {
                bar.style.background = '#48bb78';
            }
        }

        // ============================================
        // הרשמה
        // ============================================
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            hideAlert();
            clearFieldErrors();

            // איסוף נתונים
            const businessName = document.getElementById('businessName').value.trim();
            const ownerName = document.getElementById('ownerName').value.trim();
            const phone = document.getElementById('phone').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            // ===== ולידציה =====
            let hasError = false;

            if (!businessName) {
                showFieldError('businessName', 'יש להכניס שם עסק');
                hasError = true;
            } else if (businessName.length < 2) {
                showFieldError('businessName', 'שם העסק קצר מדי');
                hasError = true;
            }

            if (!ownerName) {
                showFieldError('ownerName', 'יש להכניס שם בעל העסק');
                hasError = true;
            }

            if (!phone) {
                showFieldError('phone', 'יש להכניס מספר טלפון');
                hasError = true;
            } else if (!/^[0-9\-+]{9,15}$/.test(phone.replace(/-/g, ''))) {
                showFieldError('phone', 'מספר טלפון לא תקין');
                hasError = true;
            }

            if (!email) {
                showFieldError('email', 'יש להכניס כתובת אימייל');
                hasError = true;
            } else if (!email.includes('@') || !email.includes('.')) {
                showFieldError('email', 'כתובת אימייל לא תקינה');
                hasError = true;
            }

            if (!password) {
                showFieldError('password', 'יש להכניס סיסמה');
                hasError = true;
            } else if (password.length < 6) {
                showFieldError('password', 'הסיסמה חייבת להכיל לפחות 6 תווים');
                hasError = true;
            }

            if (!confirmPassword) {
                showFieldError('confirmPassword', 'יש להכניס את הסיסמה שוב');
                hasError = true;
            } else if (password !== confirmPassword) {
                showFieldError('confirmPassword', 'הסיסמאות אינן תואמות');
                hasError = true;
            }

            if (hasError) {
                const firstError = document.querySelector('.error');
                if (firstError) {
                    firstError.focus();
                    firstError.scrollIntoView({ behavior: 'smooth', block: 'center' });
                }
                return;
            }

            // ===== שליחה =====
            registerBtn.disabled = true;
            registerBtn.innerHTML = 'יוצר חשבון <span class="spinner"></span>';

            try {
                // 1. הרשמה
                const { data: authData, error: authError } = await sb.auth.signUp({
                    email: email,
                    password: password
                });

                if (authError) {
                    if (authError.message.includes('already registered')) {
                        showAlert('❌ אימייל זה כבר רשום. נסה להתחבר.', 'error');
                    } else if (authError.message.includes('rate limit')) {
                        showAlert('⏳ הגעת למגבלת הניסיונות. אנא המתן שעה ונסה שוב.', 'error');
                    } else {
                        showAlert('❌ שגיאה: ' + authError.message, 'error');
                    }
                    registerBtn.disabled = false;
                    registerBtn.innerHTML = '🚀 הרשם עכשיו';
                    return;
                }

                if (!authData.user) {
                    showAlert('❌ שגיאה ביצירת המשתמש. נסה שוב.', 'error');
                    registerBtn.disabled = false;
                    registerBtn.innerHTML = '🚀 הרשם עכשיו';
                    return;
                }

                // 2. יצירת עסק
                const { data: business, error: bizError } = await sb
                    .from('businesses')
                    .insert([{
                        name: businessName,
                        owner_name: ownerName,
                        email: email,
                        phone: phone
                    }])
                    .select()
                    .single();

                if (bizError) {
                    await sb.auth.signOut();
                    showAlert('❌ שגיאה ביצירת העסק: ' + bizError.message, 'error');
                    registerBtn.disabled = false;
                    registerBtn.innerHTML = '🚀 הרשם עכשיו';
                    return;
                }

                // 3. קישור משתמש לעסק
                const { error: userError } = await sb
                    .from('users')
                    .insert([{
                        id: authData.user.id,
                        business_id: business.id,
                        email: email,
                        full_name: ownerName,
                        role: 'owner'
                    }]);

                if (userError) {
                    await sb.from('businesses').delete().eq('id', business.id);
                    await sb.auth.signOut();
                    showAlert('❌ שגיאה בקישור המשתמש: ' + userError.message, 'error');
                    registerBtn.disabled = false;
                    registerBtn.innerHTML = '🚀 הרשם עכשיו';
                    return;
                }

                // 4. הצלחה!
                localStorage.setItem('user', JSON.stringify(authData.user));
                localStorage.setItem('business', JSON.stringify(business));

                showAlert('🎉 העסק נוצר בהצלחה! מעביר לדשבורד...', 'success');

                setTimeout(() => {
                    window.location.href = 'dashboard.html';
                }, 2000);

            } catch (error) {
                showAlert('❌ שגיאה: ' + error.message, 'error');
                registerBtn.disabled = false;
                registerBtn.innerHTML = '🚀 הרשם עכשיו';
            }
        });

        // ============================================
        // בדיקה אם כבר מחובר
        // ============================================
        async function checkExistingSession() {
            try {
                const { data: { user } } = await sb.auth.getUser();
                if (user) {
                    window.location.href = 'dashboard.html';
                }
            } catch (error) {
                // לא מחובר - נשאר בדף
            }
        }

        // ============================================
        // ניקוי שגיאות בעת הקלדה
        // ============================================
        document.querySelectorAll('.form-group .input-wrapper input').forEach(input => {
            input.addEventListener('input', () => {
                const errorEl = document.getElementById(input.id + 'Error');
                if (errorEl) {
                    errorEl.className = 'error-msg';
                    input.className = '';
                }
                hideAlert();
            });
        });

        // ============================================
        // הרצה
        // ============================================
        document.addEventListener('DOMContentLoaded', () => {
            checkExistingSession();
        });
    </script>

</body>
</html>
