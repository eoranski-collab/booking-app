<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>הרשמה - MyCut</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:Arial,sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
        .card{background:white;border-radius:20px;padding:40px;width:100%;max-width:450px;box-shadow:0 20px 60px rgba(0,0,0,0.3)}
        h1{text-align:center;color:#333;margin-bottom:5px}
        .subtitle{text-align:center;color:#666;margin-bottom:30px}
        .form-group{margin-bottom:15px}
        .form-group label{display:block;font-weight:bold;margin-bottom:5px;color:#333}
        .form-group input{width:100%;padding:12px;border:2px solid #ddd;border-radius:10px;font-size:16px;box-sizing:border-box}
        .form-group input:focus{border-color:#667eea;outline:none}
        .btn{width:100%;padding:14px;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:white;border:none;border-radius:10px;font-size:18px;font-weight:bold;cursor:pointer}
        .btn:hover{transform:translateY(-2px);box-shadow:0 5px 20px rgba(102,126,234,0.4)}
        .btn:disabled{opacity:0.6;cursor:not-allowed}
        .alert{padding:12px;border-radius:10px;margin-bottom:15px;display:none;text-align:center}
        .alert-error{background:#fee;color:#c33;border:1px solid #fcc}
        .alert-success{background:#efe;color:#3c3;border:1px solid #cfc}
        .alert.show{display:block}
        .footer{text-align:center;margin-top:20px;color:#666}
        .footer a{color:#667eea;text-decoration:none;font-weight:bold}
        .spinner{display:inline-block;width:20px;height:20px;border:3px solid rgba(255,255,255,0.3);border-top-color:white;border-radius:50%;animation:spin 0.8s linear infinite;vertical-align:middle;margin-right:10px}
        @keyframes spin{to{transform:rotate(360deg)}}
    </style>
</head>
<body>
<div class="card">
    <h1>✂️ MyCut</h1>
    <div class="subtitle">הקמת עסק חדש</div>
    
    <div id="alert" class="alert"></div>
    
    <form id="registerForm">
        <div class="form-group">
            <label>שם העסק *</label>
            <input type="text" id="businessName" placeholder="למשל: מספרה אופיר" required>
        </div>
        <div class="form-group">
            <label>שם בעל העסק *</label>
            <input type="text" id="ownerName" placeholder="שם מלא" required>
        </div>
        <div class="form-group">
            <label>טלפון *</label>
            <input type="tel" id="phone" placeholder="050-1234567" required>
        </div>
        <div class="form-group">
            <label>אימייל *</label>
            <input type="email" id="email" placeholder="הכנס אימייל" required>
        </div>
        <div class="form-group">
            <label>סיסמה *</label>
            <input type="password" id="password" placeholder="לפחות 6 תווים" required>
        </div>
        <div class="form-group">
            <label>אימות סיסמה *</label>
            <input type="password" id="confirmPassword" placeholder="הכנס שוב" required>
        </div>
        
        <button type="submit" class="btn" id="registerBtn">🚀 הרשם עכשיו</button>
    </form>
    
    <div class="footer">
        כבר יש לך חשבון? <a href="login.html">התחבר</a>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    (function() {
        'use strict';
        
        const SUPABASE_URL = 'https://bcbnvtszkfjhfujnxldm.supabase.co';
        const SUPABASE_ANON = 'sb_publishable_IzFYbwo2gI65OvmBM53-5g_lAffckNt';
        const sb = window.supabaseClient.createClient(SUPABASE_URL, SUPABASE_ANON);

        const alertEl = document.getElementById('alert');
        const registerBtn = document.getElementById('registerBtn');

        function showAlert(msg, type = 'error') {
            alertEl.textContent = msg;
            alertEl.className = `alert alert-${type} show`;
        }

        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            alertEl.className = 'alert';
            
            const businessName = document.getElementById('businessName').value.trim();
            const ownerName = document.getElementById('ownerName').value.trim();
            const phone = document.getElementById('phone').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            if (!businessName || !ownerName || !phone || !email || !password) {
                showAlert('❌ יש למלא את כל השדות', 'error');
                return;
            }
            if (password !== confirmPassword) {
                showAlert('❌ הסיסמאות אינן תואמות', 'error');
                return;
            }
            if (password.length < 6) {
                showAlert('❌ הסיסמה חייבת להיות לפחות 6 תווים', 'error');
                return;
            }

            registerBtn.disabled = true;
            registerBtn.innerHTML = 'יוצר חשבון...';

            try {
                const { data: authData, error: authError } = await sb.auth.signUp({
                    email: email,
                    password: password
                });

                if (authError) throw new Error('שגיאת אימות: ' + authError.message);
                if (!authData.user) throw new Error('לא נוצר משתמש');

                const { data: business, error: bizError } = await sb
                    .from('businesses')
                    .insert([{
                        name: businessName,
                        owner_name: ownerName,
                        email: email,
                        phone: phone
                    }])
                    .select()
                    .single();

                if (bizError) throw new Error('שגיאה ביצירת העסק: ' + bizError.message);

                const { error: userError } = await sb
                    .from('users')
                    .insert([{
                        id: authData.user.id,
                        business_id: business.id,
                        email: email,
                        full_name: ownerName,
                        role: 'owner'
                    }]);

                if (userError) {
                    await sb.from('businesses').delete().eq('id', business.id);
                    throw new Error('שגיאה בקישור המשתמש: ' + userError.message);
                }

                localStorage.setItem('user', JSON.stringify(authData.user));
                localStorage.setItem('business', JSON.stringify(business));

                showAlert('🎉 העסק נוצר בהצלחה!', 'success');
                setTimeout(() => {
                    window.location.href = 'dashboard.html';
                }, 1500);

            } catch (error) {
                showAlert('❌ ' + error.message, 'error');
                registerBtn.disabled = false;
                registerBtn.innerHTML = '🚀 הרשם עכשיו';
            }
        });
    })();
</script>
</body>
</html>
