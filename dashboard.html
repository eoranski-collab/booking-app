<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MyCut - דשבורד</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:Arial;background:#0f0c29;color:#fff;direction:rtl;padding:20px}
        .card{background:rgba(255,255,255,0.05);border-radius:16px;padding:20px;margin-bottom:16px}
        .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:20px}
        .stat{background:rgba(255,255,255,0.05);padding:16px;border-radius:12px;text-align:center}
        .stat .num{font-size:28px;font-weight:bold;color:#f5576c}
        .btn{background:#f5576c;border:none;color:#fff;padding:10px 20px;border-radius:8px;cursor:pointer;margin:4px}
        .tab{background:rgba(255,255,255,0.05);border:none;color:#fff;padding:10px 20px;border-radius:8px;cursor:pointer;margin:4px}
        .tab.active{background:#f5576c}
        .item{display:flex;justify-content:space-between;padding:10px;border-bottom:1px solid rgba(255,255,255,0.05)}
        input,select{width:100%;padding:10px;border-radius:8px;border:none;margin:4px 0}
        .hours-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px;margin:12px 0}
        .hours-card{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.08);border-radius:12px;padding:12px 16px}
        .hours-card .day{font-weight:bold;font-size:16px}
        .hours-card .time{color:rgba(255,255,255,0.6);font-size:14px}
        .hours-card .closed{color:#f5576c}
        .link-box{background:rgba(255,255,255,0.04);padding:12px;border-radius:12px;margin-bottom:16px}
        .link-box code{background:rgba(255,255,255,0.06);padding:6px 12px;border-radius:6px;display:block;font-size:13px;word-break:break-all}
        .error{color:#f5576c;text-align:center;padding:40px}
        .btn-sm{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.08);color:rgba(255,255,255,0.6);padding:4px 12px;border-radius:8px;cursor:pointer;font-size:12px}
        .btn-sm:hover{background:rgba(245,87,108,0.15);border-color:#f5576c;color:#fff}
    </style>
</head>
<body>

    <h1>✂️ MyCut</h1>
    <div id="bizName" style="color:#aaa;margin-bottom:10px;">טוען...</div>

    <!-- קישור ייחודי -->
    <div class="link-box" id="linkBox" style="display:none;">
        <div style="font-size:13px;color:rgba(255,255,255,0.4);">📋 קישור ללקוחות:</div>
        <code id="clientLink">טוען...</code>
        <button class="btn" onclick="copyLink()" style="padding:4px 12px;font-size:12px;background:#333;margin-top:6px;">📋 העתק</button>
    </div>

    <div class="stats">
        <div class="stat"><div class="num" id="todayCount">0</div><div>📅 תורים היום</div></div>
        <div class="stat"><div class="num" id="pendingCount">0</div><div>⏳ ממתינים</div></div>
        <div class="stat"><div class="num" id="customersCount">0</div><div>👤 לקוחות</div></div>
        <div class="stat"><div class="num" id="servicesCount">0</div><div>✂️ שירותים</div></div>
    </div>

    <div>
        <button class="tab active" onclick="showTab('today')">📅 היום</button>
        <button class="tab" onclick="showTab('all')">📋 כל התורים</button>
        <button class="tab" onclick="showTab('add')">➕ תור חדש</button>
        <button class="tab" onclick="showTab('services')">✂️ שירותים</button>
        <button class="tab" onclick="showTab('employees')">👨‍💼 עובדים</button>
        <button class="tab" onclick="showTab('settings')">⚙️ הגדרות</button>
        <button class="btn" onclick="logout()" style="background:#333;float:left;">התנתק</button>
    </div>

    <div class="card" id="tabContent">
        <div style="text-align:center;padding:40px;">⏳ טוען...</div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2">
    </script>
    <script>
        // ================================================
        // CONFIG
        // ================================================
        const SUPABASE_URL = 'https://bcbnvtszkfjhfujnxldm.supabase.co';
        const SUPABASE_ANON = 'sb_publishable_IzFYbwo2gI65OvmBM53-5g_lAffckNt';
        const { createClient } = supabase;
        const sb = createClient(SUPABASE_URL, SUPABASE_ANON);

        let BUSINESS_ID = null;
        let appointments = [];
        let services = [];
        let employees = [];
        let businessHours = [];
        const DAYS = ['ראשון', 'שני', 'שלישי', 'רביעי', 'חמישי', 'שישי', 'שבת'];

        // ===== בדיקת משתמש =====
        async function init() {
            try {
                const { data: { user }, error } = await sb.auth.getUser();
                if (error || !user) { window.location.href = 'login.html'; return; }
                console.log('✅ מחובר:', user.email);

                // מציאת עסק
                const { data: userData } = await sb.from('users').select('business_id').eq('id', user.id).maybeSingle();
                if (userData?.business_id) {
                    BUSINESS_ID = userData.business_id;
                } else {
                    const { data: biz } = await sb.from('businesses').select('id, name').eq('email', user.email)
                        .maybeSingle();
                    if (biz) { BUSINESS_ID = biz.id;
                        document.getElementById('bizName').textContent = biz.name;
                        await sb.from('users').update({ business_id: BUSINESS_ID }).eq('id', user.id); }
                }

                if (!BUSINESS_ID) {
                    const { data: first } = await sb.from('businesses').select('id, name').limit(1);
                    if (first && first.length > 0) { BUSINESS_ID = first[0].id;
                        document.getElementById('bizName').textContent = first[0].name; }
                }

                if (!BUSINESS_ID) {
                    document.getElementById('bizName').textContent = '❌ לא נמצא עסק';
                    document.getElementById('tabContent').innerHTML =
                        `<div class="error"><h2>❌ לא נמצא עסק</h2><button class="btn" onclick="window.location.href='register.html'">📝 הרשם עסק</button></div>`;
                    return;
                }

                const { data: bizName } = await sb.from('businesses').select('name').eq('id', BUSINESS_ID).maybeSingle();
                if (bizName) document.getElementById('bizName').textContent = bizName.name;

                // קישור ללקוחות
                const linkEl = document.getElementById('clientLink');
                const url = window.location.origin + window.location.pathname.replace('dashboard.html', 'client.html') +
                    '?business=' + BUSINESS_ID;
                linkEl.textContent = url;
                document.getElementById('linkBox').style.display = 'block';

                await loadData();
                showTab('today');

            } catch (err) {
                console.error('❌ שגיאה:', err);
                document.getElementById('tabContent').innerHTML = `<div class="error">❌ שגיאה: ${err.message}</div>`;
            }
        }

        // ===== טעינת נתונים =====
        async function loadData() {
            if (!BUSINESS_ID) return;

            const { data: apps } = await sb.from('appointments').select('*').eq('business_id', BUSINESS_ID).order(
            'start_time');
            appointments = apps || [];

            const { data: servs } = await sb.from('services').select('*').eq('business_id', BUSINESS_ID).eq('is_active',
                true);
            services = servs || [];

            const { data: emps } = await sb.from('employees').select('*').eq('business_id', BUSINESS_ID).eq('is_active',
                true);
            employees = emps || [];

            const { data: hours } = await sb.from('business_hours').select('*').eq('business_id', BUSINESS_ID);
            businessHours = hours || [];

            const today = new Date();
            today.setHours(0, 0, 0, 0);
            document.getElementById('todayCount').textContent = appointments.filter(a => new Date(a.start_time) >= today)
                .length;
            document.getElementById('pendingCount').textContent = appointments.filter(a => a.status === 'pending').length;
            document.getElementById('customersCount').textContent = appointments.filter(a => a.customer_name).length;
            document.getElementById('servicesCount').textContent = services.length;

            console.log('📊 נטען:', appointments.length, 'תורים,', services.length, 'שירותים,', businessHours.length,
                'שעות עבודה');
        }

        // ===== פונקציות עזר =====
        function formatTime(d) { return new Date(d).toLocaleTimeString('he-IL', { hour: '2-digit', minute: '2-digit' }); }

        function formatDate(d) { return new Date(d).toLocaleDateString('he-IL'); }

        function statusLabel(s) {
            const map = { 'pending': '⏳ ממתין', 'confirmed': '✅ מאושר', 'cancelled': '❌ מבוטל', 'completed': '✔️ הושלם' };
            return map[s] || s;
        }

        // ===== הצגת טאבים =====
        window.showTab = function(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            const tabMap = { 'today': 0, 'all': 1, 'add': 2, 'services': 3, 'employees': 4, 'settings': 5 };
            if (tabMap[tab] !== undefined) {
                document.querySelectorAll('.tab')[tabMap[tab]].classList.add('active');
            }

            const container = document.getElementById('tabContent');

            if (tab === 'today') {
                const today = new Date();
                today.setHours(0, 0, 0, 0);
                const items = appointments.filter(a => new Date(a.start_time) >= today);
                container.innerHTML = items.length ? items.map(a => `
                        <div class="item">
                            <div><strong>${a.customer_name || 'לקוח'}</strong> - ${a.service_name || 'שירות'}<br><small>🕐 ${formatTime(a.start_time)}</small></div>
                            <div><span style="background:rgba(72,187,120,0.2);padding:4px 12px;border-radius:20px;font-size:12px;">${statusLabel(a.status)}</span>
                            ${a.status !== 'cancelled' ? `<button class="btn" style="padding:4px 12px;font-size:12px;background:#e53e3e;" onclick="cancelApp('${a.id}')">בטל</button>` : ''}</div>
                        </div>
                    `).join('') : '<div style="text-align:center;padding:40px;">📭 אין תורים להיום</div>';
            } else if (tab === 'all') {
                container.innerHTML = appointments.length ? appointments.map(a => `
                        <div class="item">
                            <div><strong>${a.customer_name || 'לקוח'}</strong> - ${a.service_name || 'שירות'}<br><small>📅 ${formatDate(a.start_time)} 🕐 ${formatTime(a.start_time)}</small></div>
                            <div><span style="background:rgba(72,187,120,0.2);padding:4px 12px;border-radius:20px;font-size:12px;">${statusLabel(a.status)}</span>
                            ${a.status !== 'cancelled' ? `<button class="btn" style="padding:4px 12px;font-size:12px;background:#e53e3e;" onclick="cancelApp('${a.id}')">בטל</button>` : ''}</div>
                        </div>
                    `).join('') : '<div style="text-align:center;padding:40px;">📭 אין תורים</div>';
            } else if (tab === 'add') {
                const opts = services.map(s =>
                    `<option value="${s.id}">${s.name} (${s.duration_minutes}דק, ${s.price}₪)</option>`).join('');
                const empOpts = employees.map(e => `<option value="${e.id}">${e.name}</option>`).join('');
                container.innerHTML = `
                        <h3>➕ תור חדש</h3>
                        <form onsubmit="addApp(event)">
                            <input type="text" id="cName" placeholder="שם לקוח" required>
                            <input type="tel" id="cPhone" placeholder="טלפון" required>
                            <select id="sId" required><option value="">בחר שירות...</option>${opts}</select>
                            <select id="empId"><option value="">ללא העדפה</option>${empOpts}</select>
                            <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">
                                <input type="date" id="aDate" required>
                                <input type="time" id="aTime" required>
                            </div>
                            <button type="submit" class="btn" style="width:100%;padding:12px;">💾 שמור תור</button>
                        </form>
                    `;
            } else if (tab === 'services') {
                container.innerHTML = `
                        <div style="display:flex;justify-content:space-between;align-items:center;">
                            <h3>✂️ שירותים</h3>
                            <button class="btn" onclick="addService()">➕ הוסף</button>
                        </div>
                        ${services.length ? services.map(s => `
                            <div class="item">
                                <div><strong>${s.name}</strong> - ${s.duration_minutes}דק, ${s.price}₪</div>
                                <button class="btn" style="padding:4px 12px;font-size:12px;background:#e53e3e;" onclick="deleteService('${s.id}')">🗑️</button>
                            </div>
                        `).join('') : '<div style="text-align:center;padding:40px;">✂️ אין שירותים</div>'}
                    `;
            } else if (tab === 'employees') {
                container.innerHTML = `
                        <div style="display:flex;justify-content:space-between;align-items:center;">
                            <h3>👨‍💼 עובדים</h3>
                            <button class="btn" onclick="addEmployee()">➕ הוסף</button>
                        </div>
                        ${employees.length ? employees.map(e => `
                            <div class="item">
                                <div><strong>${e.name}</strong> ${e.phone ? `- 📞 ${e.phone}` : ''}</div>
                                <button class="btn" style="padding:4px 12px;font-size:12px;background:#e53e3e;" onclick="deleteEmployee('${e.id}')">🗑️</button>
                            </div>
                        `).join('') : '<div style="text-align:center;padding:40px;">👨‍💼 אין עובדים</div>'}
                    `;
            } else if (tab === 'settings') {
                // הצגת שעות עבודה
                let hoursHtml = '';
                if (businessHours.length > 0) {
                    hoursHtml = businessHours.map(h => `
                        <div class="hours-card">
                            <div class="day">${DAYS[h.day_of_week]}</div>
                            ${h.is_open ? `<div class="time">🕐 ${h.open_time} - ${h.close_time}</div>` : `<div class="closed">❌ סגור</div>`}
                            <button class="btn-sm" onclick="editHour('${h.id}','${h.day_of_week}','${h.is_open}','${h.open_time||''}','${h.close_time||''}')" style="margin-top:6px;">✏️ ערוך</button>
                        </div>
                    `).join('');
                } else {
                    hoursHtml = `<div class="error">🕐 לא הוגדרו שעות עבודה</div>`;
                }

                container.innerHTML = `
                        <h3>⚙️ הגדרות</h3>
                        <div style="background:rgba(255,255,255,0.04);padding:16px;border-radius:12px;margin-bottom:16px;">
                            <h4>🕐 שעות עבודה</h4>
                            <div class="hours-grid">${hoursHtml}</div>
                            <button class="btn" onclick="addHour()" style="padding:6px 16px;font-size:13px;">➕ הוסף יום</button>
                        </div>
                        <div style="background:rgba(255,255,255,0.04);padding:16px;border-radius:12px;">
                            <h4>🏖️ חגים</h4>
                            <button class="btn" onclick="addHoliday()" style="padding:6px 16px;font-size:13px;">➕ הוסף חג</button>
                        </div>
                    `;
            }
        };

        // ===== ניהול שעות עבודה =====
        window.addHour = async function() {
            let msg = '📅 בחר יום:\n\n';
            for (let i = 0; i < 7; i++) {
                const exists = businessHours.find(h => h.day_of_week === i);
                msg += `${i+1}. ${DAYS[i]} ${exists ? '✅' : '❌'}\n`;
            }
            msg += '\nהקלד את מספר היום (1-7):';

            const dayNum = prompt(msg);
            if (!dayNum) return;
            const dayIndex = parseInt(dayNum) - 1;
            if (dayIndex < 0 || dayIndex > 6) { alert('❌ יום לא תקין'); return; }

            const isOpen = confirm('האם העסק פתוח ביום זה?');
            let openTime = '09:00',
                closeTime = '18:00';
            if (isOpen) {
                openTime = prompt('🕐 שעת פתיחה (HH:MM):', '09:00');
                if (!openTime) return;
                closeTime = prompt('🕐 שעת סגירה (HH:MM):', '18:00');
                if (!closeTime) return;
            }

            const { error } = await sb.from('business_hours').insert([{
                business_id: BUSINESS_ID,
                day_of_week: dayIndex,
                is_open: isOpen,
                open_time: isOpen ? openTime : null,
                close_time: isOpen ? closeTime : null
            }]);

            if (error) { alert('❌ ' + error.message); return; }
            alert('✅ שעות עבודה נשמרו!');
            await loadData();
            showTab('settings');
        };

        window.editHour = async function(id, day, isOpen, openTime, closeTime) {
            const dayName = DAYS[parseInt(day)];
            const action = prompt(
                `✏️ עריכת ${dayName}\n\n1. שנה שעות\n2. סגור את היום\n3. פתח את היום\n4. מחק יום\n\nבחר מספר:`);

            if (action === '1') {
                const newOpen = prompt('🕐 שעת פתיחה (HH:MM):', openTime || '09:00');
                if (!newOpen) return;
                const newClose = prompt('🕐 שעת סגירה (HH:MM):', closeTime || '18:00');
                if (!newClose) return;
                const { error } = await sb.from('business_hours').update({
                    is_open: true,
                    open_time: newOpen,
                    close_time: newClose
                }).eq('id', id);
                if (error) { alert('❌ ' + error.message); return; }
                alert('✅ עודכן!');
            } else if (action === '2') {
                const { error } = await sb.from('business_hours').update({ is_open: false, open_time: null,
                    close_time: null }).eq('id', id);
                if (error) { alert('❌ ' + error.message); return; }
                alert('✅ היום נסגר!');
            } else if (action === '3') {
                const newOpen = prompt('🕐 שעת פתיחה (HH:MM):', '09:00');
                if (!newOpen) return;
                const newClose = prompt('🕐 שעת סגירה (HH:MM):', '18:00');
                if (!newClose) return;
                const { error } = await sb.from('business_hours').update({
                    is_open: true,
                    open_time: newOpen,
                    close_time: newClose
                }).eq('id', id);
                if (error) { alert('❌ ' + error.message); return; }
                alert('✅ היום נפתח!');
            } else if (action === '4') {
                if (!confirm('למחוק את היום?')) return;
                const { error } = await sb.from('business_hours').delete().eq('id', id);
                if (error) { alert('❌ ' + error.message); return; }
                alert('✅ נמחק!');
            } else {
                alert('❌ בחירה לא תקינה');
                return;
            }

            await loadData();
            showTab('settings');
        };

        // ===== פעולות תורים =====
        window.addApp = async function(e) {
            e.preventDefault();
            const name = document.getElementById('cName').value.trim();
            const phone = document.getElementById('cPhone').value.trim();
            const serviceId = document.getElementById('sId').value;
            const employeeId = document.getElementById('empId').value || null;
            const date = document.getElementById('aDate').value;
            const time = document.getElementById('aTime').value;

            if (!name || !phone || !serviceId || !date || !time) { alert('❌ יש למלא הכל'); return; }
            const service = services.find(s => s.id === serviceId);
            if (!service) { alert('❌ שירות לא נמצא'); return; }

            const start = new Date(`${date}T${time}:00`);
            const end = new Date(start.getTime() + service.duration_minutes * 60000);

            const { error } = await sb.from('appointments').insert([{
                business_id: BUSINESS_ID,
                customer_name: name,
                customer_phone: phone,
                service_id: serviceId,
                service_name: service.name,
                employee_id: employeeId,
                start_time: start.toISOString(),
                end_time: end.toISOString(),
                price: service.price,
                status: 'confirmed'
            }]);

            if (error) { alert('❌ ' + error.message); return; }
            alert('✅ תור נוצר!');
            await loadData();
            showTab('today');
        };

        window.cancelApp = async function(id) {
            if (!confirm('לבטל תור?')) return;
            const { error } = await sb.from('appointments').update({ status: 'cancelled' }).eq('id', id);
            if (error) { alert('❌ ' + error.message); return; }
            alert('✅ בוטל!');
            await loadData();
            showTab('today');
        };

        window.addService = async function() {
            const name = prompt('📝 שם השירות:');
            if (!name) return;
            const duration = parseInt(prompt('⏱️ משך (דקות):'));
            if (!duration) return;
            const price = parseFloat(prompt('💰 מחיר (ש"ח):'));
            if (!price) return;

            const { error } = await sb.from('services').insert([{
                business_id: BUSINESS_ID,
                name: name,
                duration_minutes: duration,
                price: price,
                is_active: true
            }]);

            if (error) { alert('❌ ' + error.message); return; }
            alert('✅ שירות נוסף!');
            await loadData();
            showTab('services');
        };

        window.deleteService = async function(id) {
            if (!confirm('למחוק שירות?')) return;
            const { error } = await sb.from('services').update({ is_active: false }).eq('id', id);
            if (error) { alert('❌ ' + error.message); return; }
            alert('✅ נמחק!');
            await loadData();
            showTab('services');
        };

        window.addEmployee = async function() {
            const name = prompt('📝 שם העובד:');
            if (!name) return;
            const phone = prompt('📞 טלפון:');
            if (!phone) return;

            const { error } = await sb.from('employees').insert([{
                business_id: BUSINESS_ID,
                name: name,
                phone: phone,
                is_active: true
            }]);

            if (error) { alert('❌ ' + error.message); return; }
            alert('✅ עובד נוסף!');
            await loadData();
            showTab('employees');
        };

        window.deleteEmployee = async function(id) {
            if (!confirm('למחוק עובד?')) return;
            const { error } = await sb.from('employees').update({ is_active: false }).eq('id', id);
            if (error) { alert('❌ ' + error.message); return; }
            alert('✅ נמחק!');
            await loadData();
            showTab('employees');
        };

        window.addHoliday = async function() {
            const date = prompt('📅 תאריך (YYYY-MM-DD):');
            if (!date) return;
            const name = prompt('📝 שם החג:');
            if (!name) return;

            const { error } = await sb.from('holidays').insert([{
                business_id: BUSINESS_ID,
                holiday_date: date,
                name: name,
                is_closed: true
            }]);

            if (error) { alert('❌ ' + error.message); return; }
            alert('✅ חג נוסף!');
            await loadData();
            showTab('settings');
        };

        window.copyLink = function() {
            const linkEl = document.getElementById('clientLink');
            const text = linkEl.textContent;
            navigator.clipboard.writeText(text).then(() => alert('✅ הקישור הועתק!')).catch(() => {
                const ta = document.createElement('textarea');
                ta.value = text;
                document.body.appendChild(ta);
                ta.select();
                document.execCommand('copy');
                ta.remove();
                alert('✅ הקישור הועתק!');
            });
        };

        window.logout = async function() {
            await sb.auth.signOut();
            localStorage.clear();
            window.location.href = 'login.html';
        };

        // ===== הפעלה =====
        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
