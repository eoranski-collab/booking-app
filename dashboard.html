<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>דשבורד - MyCut</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:Arial,sans-serif;background:#f0f2f5;direction:rtl}
        .header{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:white;padding:20px 30px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px}
        .header h1{font-size:24px}
        .header .user-info{display:flex;align-items:center;gap:15px}
        .header button{background:rgba(255,255,255,0.2);border:1px solid rgba(255,255,255,0.3);color:white;padding:8px 16px;border-radius:8px;cursor:pointer}
        .header button:hover{background:rgba(255,255,255,0.3)}
        .container{max-width:1200px;margin:30px auto;padding:0 20px}
        .stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:15px;margin-bottom:30px}
        .stat-card{background:white;padding:20px;border-radius:12px;box-shadow:0 2px 8px rgba(0,0,0,0.1);text-align:center}
        .stat-card .number{font-size:28px;font-weight:bold;color:#667eea}
        .stat-card .label{color:#666;font-size:14px;margin-top:5px}
        .section{background:white;border-radius:12px;padding:20px;margin-bottom:20px;box-shadow:0 2px 8px rgba(0,0,0,0.1)}
        .section h2{margin-bottom:15px;color:#333;font-size:20px}
        .section .empty{text-align:center;padding:30px;color:#999}
        .appointment-item{display:flex;justify-content:space-between;align-items:center;padding:12px;border-bottom:1px solid #eee;flex-wrap:wrap;gap:10px}
        .appointment-item:last-child{border-bottom:none}
        .appointment-info{flex:1;min-width:200px}
        .appointment-info .name{font-weight:bold;font-size:16px}
        .appointment-info .details{color:#666;font-size:14px;margin-top:3px}
        .status{padding:4px 12px;border-radius:20px;font-size:12px;font-weight:bold}
        .status-pending{background:#fff3cd;color:#856404}
        .status-confirmed{background:#d4edda;color:#155724}
        .status-cancelled{background:#f8d7da;color:#721c24}
        .status-completed{background:#cce5ff;color:#004085}
        .btn{background:#667eea;color:white;border:none;padding:6px 14px;border-radius:6px;cursor:pointer;font-size:13px}
        .btn:hover{background:#5a67d8}
        .btn-danger{background:#e53e3e}
        .btn-danger:hover{background:#c53030}
        .btn-success{background:#48bb78}
        .btn-success:hover{background:#38a169}
        .tabs{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap}
        .tab{background:#e2e8f0;border:none;padding:10px 20px;border-radius:8px;cursor:pointer;font-size:14px}
        .tab.active{background:#667eea;color:white}
        .form-group{margin-bottom:15px}
        .form-group label{display:block;font-weight:bold;margin-bottom:5px;color:#333}
        .form-group input,.form-group select{width:100%;padding:10px;border:2px solid #ddd;border-radius:8px;font-size:14px;box-sizing:border-box}
        .form-group input:focus,.form-group select:focus{border-color:#667eea;outline:none}
        .form-row{display:grid;grid-template-columns:1fr 1fr;gap:15px}
        @media(max-width:600px){.form-row{grid-template-columns:1fr}}
        .modal{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);z-index:1000;align-items:center;justify-content:center}
        .modal.show{display:flex}
        .modal-content{background:white;border-radius:16px;padding:30px;max-width:500px;width:90%;max-height:90vh;overflow-y:auto}
        .modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
        .modal-close{background:none;border:none;font-size:24px;cursor:pointer;color:#999}
        .service-item{display:flex;justify-content:space-between;align-items:center;padding:10px;border-bottom:1px solid #eee}
    </style>
</head>
<body>

<div class="header">
    <h1>✂️ MyCut - ניהול עסק</h1>
    <div class="user-info">
        <span id="businessNameDisplay">טוען...</span>
        <button onclick="logout()">התנתק</button>
    </div>
</div>

<div class="container">
    <div class="stats">
        <div class="stat-card"><div class="number" id="todayCount">0</div><div class="label">📅 תורים היום</div></div>
        <div class="stat-card"><div class="number" id="pendingCount">0</div><div class="label">⏳ ממתינים</div></div>
        <div class="stat-card"><div class="number" id="customersCount">0</div><div class="label">👤 לקוחות</div></div>
        <div class="stat-card"><div class="number" id="servicesCount">0</div><div class="label">✂️ שירותים</div></div>
    </div>

    <div class="tabs">
        <button class="tab active" onclick="switchTab('today')">📅 היום</button>
        <button class="tab" onclick="switchTab('all')">📋 כל התורים</button>
        <button class="tab" onclick="switchTab('add')">➕ תור חדש</button>
        <button class="tab" onclick="switchTab('services')">✂️ שירותים</button>
    </div>

    <div id="tabContent"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    const SUPABASE_URL = 'https://bcbnvtszkfjhfujnxldm.supabase.co';
    const SUPABASE_ANON = 'sb_publishable_IzFYbwo2gI65OvmBM53-5g_lAffckNt';
    const supabase = window.supabaseClient.createClient(SUPABASE_URL, SUPABASE_ANON);

    let currentBusiness = null;
    let currentUser = null;
    let appointments = [];
    let services = [];

    function formatTime(d) { return new Date(d).toLocaleTimeString('he-IL', {hour:'2-digit',minute:'2-digit'}); }
    function formatDate(d) { return new Date(d).toLocaleDateString('he-IL'); }
    function getStatusLabel(s) {
        const map = {'pending':'⏳ ממתין','confirmed':'✅ מאושר','cancelled':'❌ מבוטל','completed':'✔️ הושלם'};
        return map[s]||s;
    }
    function getStatusClass(s) {
        const map = {'pending':'status-pending','confirmed':'status-confirmed','cancelled':'status-cancelled','completed':'status-completed'};
        return map[s]||'';
    }

    async function checkAuth() {
        const { data: { user } } = await supabase.auth.getUser();
        if (!user) { window.location.href = 'login.html'; return null; }
        currentUser = user;
        return user;
    }

    async function getBusiness() {
        if (!currentUser) return null;
        const { data: userData } = await supabase.from('users').select('business_id').eq('id', currentUser.id).single();
        if (!userData) return null;
        const { data: business } = await supabase.from('businesses').select('*').eq('id', userData.business_id).single();
        currentBusiness = business;
        document.getElementById('businessNameDisplay').textContent = business?.name || 'עסק';
        return business;
    }

    async function loadAppointments() {
        if (!currentBusiness) return;
        const { data, error } = await supabase
            .from('appointments')
            .select('*')
            .eq('business_id', currentBusiness.id)
            .order('start_time', { ascending: true });
        if (!error) appointments = data || [];
        return appointments;
    }

    async function loadServices() {
        if (!currentBusiness) return;
        const { data, error } = await supabase
            .from('services')
            .select('*')
            .eq('business_id', currentBusiness.id)
            .eq('is_active', true);
        if (!error) services = data || [];
        return services;
    }

    function renderToday() {
        const today = new Date(); today.setHours(0,0,0,0);
        const todayApps = appointments.filter(a => new Date(a.start_time) >= today);
        if (!todayApps.length) return `<div class="empty">📭 אין תורים להיום</div>`;
        return todayApps.map(a => `
            <div class="appointment-item">
                <div class="appointment-info">
                    <div class="name">${a.customer_name||'לקוח'} - ${a.service_name||'שירות'}</div>
                    <div class="details">📞 ${a.customer_phone||''} | 🕐 ${formatTime(a.start_time)}</div>
                </div>
                <div>
                    <span class="status ${getStatusClass(a.status)}">${getStatusLabel(a.status)}</span>
                    ${a.status !== 'cancelled' ? `<button class="btn btn-danger" onclick="cancelAppointment('${a.id}')">❌ בטל</button>` : ''}
                </div>
            </div>
        `).join('');
    }

    function renderAll() {
        if (!appointments.length) return `<div class="empty">📭 אין תורים</div>`;
        return appointments.map(a => `
            <div class="appointment-item">
                <div class="appointment-info">
                    <div class="name">${a.customer_name||'לקוח'} - ${a.service_name||'שירות'}</div>
                    <div class="details">📅 ${formatDate(a.start_time)} | 🕐 ${formatTime(a.start_time)} | 📞 ${a.customer_phone||''}</div>
                </div>
                <div>
                    <span class="status ${getStatusClass(a.status)}">${getStatusLabel(a.status)}</span>
                    ${a.status !== 'cancelled' ? `<button class="btn btn-danger" onclick="cancelAppointment('${a.id}')">❌ בטל</button>` : ''}
                </div>
            </div>
        `).join('');
    }

    function renderAddAppointment() {
        const serviceOptions = services.map(s => `<option value="${s.id}">${s.name} (${s.duration_minutes}דק', ${s.price}₪)</option>`).join('');
        return `
            <h3>➕ תור חדש</h3>
            <form id="addForm">
                <div class="form-group"><label>שם לקוח *</label><input type="text" id="cName" required></div>
                <div class="form-group"><label>טלפון *</label><input type="tel" id="cPhone" required></div>
                <div class="form-group"><label>שירות *</label><select id="sId" required><option value="">בחר...</option>${serviceOptions}</select></div>
                <div class="form-row">
                    <div class="form-group"><label>תאריך *</label><input type="date" id="aDate" required></div>
                    <div class="form-group"><label>שעה *</label><input type="time" id="aTime" required></div>
                </div>
                <button type="submit" class="btn" style="width:100%;padding:12px;font-size:16px">💾 שמור תור</button>
            </form>
        `;
    }

    function renderServices() {
        if (!services.length) {
            return `<div class="empty">✂️ אין שירותים</div><button class="btn" onclick="showAddService()">➕ הוסף שירות</button>`;
        }
        return `
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:15px;flex-wrap:wrap;gap:10px">
                <h3>✂️ השירותים שלי</h3>
                <button class="btn btn-success" onclick="showAddService()">➕ הוסף שירות</button>
            </div>
            ${services.map(s => `
                <div class="service-item">
                    <div><strong>${s.name}</strong> <span style="color:#666;margin-right:10px">${s.duration_minutes} דקות</span> <span style="color:#667eea;font-weight:bold">${s.price}₪</span></div>
                    <button class="btn btn-danger" onclick="deleteService('${s.id}')">🗑️</button>
                </div>
            `).join('')}
        `;
    }

    window.switchTab = function(tab) {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.tab')[['today','all','add','services'].indexOf(tab)].classList.add('active');
        const container = document.getElementById('tabContent');
        switch(tab) {
            case 'today': container.innerHTML = renderToday(); break;
            case 'all': container.innerHTML = renderAll(); break;
            case 'add': container.innerHTML = renderAddAppointment(); break;
            case 'services': container.innerHTML = renderServices(); break;
        }
        if (tab === 'add') document.getElementById('addForm')?.addEventListener('submit', handleAddAppointment);
    };

    async function handleAddAppointment(e) {
        e.preventDefault();
        const name = document.getElementById('cName').value.trim();
        const phone = document.getElementById('cPhone').value.trim();
        const serviceId = document.getElementById('sId').value;
        const date = document.getElementById('aDate').value;
        const time = document.getElementById('aTime').value;
        if (!name||!phone||!serviceId||!date||!time) { alert('❌ יש למלא הכל'); return; }
        const service = services.find(s => s.id === serviceId);
        if (!service) { alert('❌ שירות לא נמצא'); return; }
        const start = new Date(`${date}T${time}:00`);
        const end = new Date(start.getTime() + service.duration
