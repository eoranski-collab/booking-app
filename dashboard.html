<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MyCut - דשבורד</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:Arial;background:#0f0c29;color:#fff;direction:rtl;padding:20px}
        .card{background:rgba(255,255,255,0.05);border-radius:16px;padding:20px;margin-bottom:16px}
        .stat{background:rgba(255,255,255,0.05);padding:16px;border-radius:12px;text-align:center;display:inline-block;margin:8px;min-width:120px}
        .stat .num{font-size:28px;font-weight:bold;color:#f5576c}
        .item{display:flex;justify-content:space-between;padding:10px;border-bottom:1px solid rgba(255,255,255,0.05)}
        .btn{background:#f5576c;border:none;color:#fff;padding:8px 16px;border-radius:8px;cursor:pointer;margin:4px}
        .btn:hover{opacity:0.8}
    </style>
</head>
<body>

    <h1>✂️ MyCut</h1>
    <div id="bizName" style="color:#aaa;margin-bottom:20px;">טוען...</div>

    <div id="statsContainer">
        <div class="stat"><div class="num" id="todayCount">0</div><div>📅 תורים היום</div></div>
        <div class="stat"><div class="num" id="totalCount">0</div><div>📋 סה"כ תורים</div></div>
    </div>

    <div id="appointmentsList" class="card">
        <div style="text-align:center;padding:20px;">⏳ טוען תורים...</div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2">
    </script>
    <script>
        // ================================================
        // ✅ קוד פשוט לבדיקה - בלי טאבים, בלי סיבוכים
        // ================================================
        console.log('🔥 דף דשבורד נטען!');

        const SUPABASE_URL = 'https://bcbnvtszkfjhfujnxldm.supabase.co';
        const SUPABASE_ANON = 'sb_publishable_IzFYbwo2gI65OvmBM53-5g_lAffckNt';
        const { createClient } = supabase;
        const sb = createClient(SUPABASE_URL, SUPABASE_ANON);

        // ⚠️ חשוב: תשים כאן את ה-ID שלך!
        const BUSINESS_ID = '4df0a3d7-de7e-4250-a7e8-3eb08565ef34';

        console.log('🆔 Business ID:', BUSINESS_ID);

        // ===== טעינת נתונים =====
        async function loadData() {
            try {
                console.log('📡 טוען נתונים...');

                // 1. שליפת שם העסק
                const { data: biz, error: bizError } = await sb
                    .from('businesses')
                    .select('name')
                    .eq('id', BUSINESS_ID)
                    .maybeSingle();

                if (bizError) {
                    console.error('❌ שגיאת עסק:', bizError);
                } else if (biz) {
                    document.getElementById('bizName').textContent = biz.name;
                    console.log('✅ עסק:', biz.name);
                } else {
                    document.getElementById('bizName').textContent = '❌ עסק לא נמצא';
                }

                // 2. שליפת תורים
                const { data: apps, error: appsError } = await sb
                    .from('appointments')
                    .select('*')
                    .eq('business_id', BUSINESS_ID)
                    .order('start_time', { ascending: true });

                if (appsError) {
                    console.error('❌ שגיאת תורים:', appsError);
                    document.getElementById('appointmentsList').innerHTML =
                        `<div style="text-align:center;padding:20px;color:#f5576c;">❌ שגיאה: ${appsError.message}</div>`;
                    return;
                }

                console.log('✅ תורים:', apps?.length || 0);

                // 3. הצגת תורים
                const container = document.getElementById('appointmentsList');
                if (!apps || apps.length === 0) {
                    container.innerHTML = `<div style="text-align:center;padding:20px;">📭 אין תורים</div>`;
                } else {
                    // סטטיסטיקות
                    const today = new Date();
                    today.setHours(0, 0, 0, 0);
                    const todayApps = apps.filter(a => new Date(a.start_time) >= today);
                    document.getElementById('todayCount').textContent = todayApps.length;
                    document.getElementById('totalCount').textContent = apps.length;

                    // רשימת תורים
                    container.innerHTML = apps.map(a => `
                        <div class="item">
                            <div>
                                <strong>${a.customer_name || 'לקוח'}</strong> - ${a.service_name || 'שירות'}
                                <br /><small>📅 ${new Date(a.start_time).toLocaleDateString('he-IL')} | 🕐 ${new Date(a.start_time).toLocaleTimeString('he-IL', {hour:'2-digit', minute:'2-digit'})}</small>
                            </div>
                            <div>
                                <span style="background:rgba(72,187,120,0.2);padding:4px 12px;border-radius:20px;font-size:12px;">
                                    ${a.status === 'pending' ? '⏳ ממתין' : '✅ מאושר'}
                                </span>
                            </div>
                        </div>
                    `).join('');
                }

            } catch (err) {
                console.error('❌ שגיאה כללית:', err);
                document.getElementById('appointmentsList').innerHTML =
                    `<div style="text-align:center;padding:20px;color:#f5576c;">❌ שגיאה: ${err.message}</div>`;
            }
        }

        // ===== הפעלה =====
        loadData();
    </script>
</body>
</html>
