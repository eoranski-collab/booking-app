<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MyCut - דשבורד</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:Arial;background:#0f0c29;color:#fff;direction:rtl;padding:20px}
        .card{background:rgba(255,255,255,0.05);border-radius:16px;padding:20px;margin-bottom:16px}
        .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:20px}
        .stat{background:rgba(255,255,255,0.05);padding:16px;border-radius:12px;text-align:center}
        .stat .num{font-size:28px;font-weight:bold;color:#f5576c}
        .btn{background:#f5576c;border:none;color:#fff;padding:10px 20px;border-radius:8px;cursor:pointer;margin:4px}
        .btn:hover{opacity:0.8}
        .tab{background:rgba(255,255,255,0.05);border:none;color:#fff;padding:10px 20px;border-radius:8px;cursor:pointer;margin:4px}
        .tab.active{background:#f5576c}
        .item{display:flex;justify-content:space-between;padding:10px;border-bottom:1px solid rgba(255,255,255,0.05)}
        input,select{width:100%;padding:10px;border-radius:8px;border:none;margin:4px 0}
        .link-box{background:rgba(255,255,255,0.04);padding:12px;border-radius:12px;margin-bottom:16px}
        .link-box code{background:rgba(255,255,255,0.06);padding:6px 12px;border-radius:6px;display:block;font-size:13px;word-break:break-all}
        .btn-whatsapp{background:#25D366;color:#fff;padding:4px 12px;border-radius:20px;text-decoration:none;font-size:12px;display:inline-block;margin:2px}
        .btn-whatsapp:hover{background:#1da851}
        .error{color:#f5576c;text-align:center;padding:40px}
        .badge{padding:4px 12px;border-radius:20px;font-size:12px;display:inline-block}
        .badge-pending{background:#ffc10733;color:#ffc107}
        .badge-confirmed{background:#48bb7822;color:#48bb78}
        .badge-cancelled{background:#f5576c33;color:#f5576c}
        .badge-completed{background:#4299e133;color:#4299e1}
    </style>
</head>
<body>

    <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;margin-bottom:10px;">
        <h1>✂️ MyCut</h1>
        <button class="btn" onclick="logout()" style="background:#333;">התנתק</button>
    </div>
    <div id="bizName" style="color:#aaa;margin-bottom:10px;">טוען...</div>

    <!-- קישור ייחודי -->
    <div class="link-box" id="linkBox" style="display:none;">
        <div style="font-size:13px;color:rgba(255,255,255,0.4);">📋 קישור ללקוחות:</div>
        <code id="clientLink">טוען...</code>
        <button class="btn" onclick="copyLink()" style="padding:4px 12px;font-size:12px;background:#333;margin-top:6px;">📋 העתק</button>
    </div>

    <div class="stats">
        <div class="stat"><div class="num" id="todayCount">0</div><div>📅 תורים היום</div></div>
        <div class="stat"><div class="num" id="pendingCount">0</div><div>⏳ ממתינים</div></div>
        <div class="stat"><div class="num" id="customersCount">0</div><div>👤 לקוחות</div></div>
        <div class="stat"><div class="num" id="servicesCount">0</div><div>✂️ שירותים</div></div>
    </div>

    <div>
        <button class="tab active" onclick="showTab('today')">📅 היום</button>
        <button class="tab" onclick="showTab('all')">📋 כל התורים</button>
        <button class="tab" onclick="showTab('add')">➕ תור חדש</button>
        <button class="tab" onclick="showTab('services')">✂️ שירותים</button>
        <button class="tab" onclick="showTab('employees')">👨‍💼 עובדים</button>
        <button class="tab" onclick="showTab('settings')">⚙️ הגדרות</button>
    </div>

    <div class="card" id="tabContent">
        <div style="text-align:center;padding:40px;">⏳ טוען...</div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2">
    </script>
    <script>
        // ================================================
        // קוד פשוט עם ID קבוע
        // ================================================
        const SUPABASE_URL = 'https://bcbnvtszkfjhfujnxldm.supabase.co';
        const SUPABASE_ANON = 'sb_publishable_IzFYbwo2gI65OvmBM53-5g_lAffckNt';
        const { createClient } = supabase;
        const sb = createClient(SUPABASE_URL, SUPABASE_ANON);

        const BUSINESS_ID = '44f70d93-dd7e-4250-a7e8-3eb08565ef34';
        let appointments = [];
        let services = [];
        let employees = [];

        // ===== אתחול =====
        async function init() {
            try {
                // בדיקת משתמש
                const { data: { user } } = await sb.auth.getUser();
                if (!user) {
                    window.location.href = 'login.html';
                    return;
                }
                console.log('✅ מחובר:', user.email);

                // הצגת שם העסק
                const { data: bizName } = await sb.from('businesses').select('name').eq('id', BUSINESS_ID).maybeSingle();
                if (bizName) document.getElementById('bizName').textContent = bizName.name;

                // קישור ייחודי
                const linkEl = document.getElementById('clientLink');
                const url = window.location.origin + window.location.pathname.replace('dashboard.html', 'client.html') +
                    '?business=' + BUSINESS_ID;
                linkEl.textContent = url;
                document.getElementById('linkBox').style.display = 'block';

                // טעינת נתונים
                await loadData();
                showTab('today');

            } catch (err) {
                console.error('❌ שגיאה:', err);
                document.getElementById('tabContent').innerHTML = `<div class="error">❌ ${err.message}</div>`;
            }
        }

        // ===== טעינת נתונים =====
        async function loadData() {
            const { data: apps } = await sb.from('appointments').select('*').eq('business_id', BUSINESS_ID).order(
            'start_time');
            appointments = apps || [];

            const { data: servs } = await sb.from('services').select('*').eq('business_id', BUSINESS_ID).eq('is_active',
                true);
            services = servs || [];

            const { data: emps } = await sb.from('employees').select('*').eq('business_id', BUSINESS_ID).eq('is_active',
                true);
            employees = emps || [];

            const today = new Date();
            today.setHours(0, 0, 0, 0);
            document.getElementById('todayCount').textContent = appointments.filter(a => new Date(a.start_time) >= today)
                .length;
            document.getElementById('pendingCount').textContent = appointments.filter(a => a.status === 'pending').length;
            document.getElementById('customersCount').textContent = appointments.filter(a => a.customer_name).length;
            document.getElementById('servicesCount').textContent = services.length;

            console.log('📊 נטען:', appointments.length, 'תורים,', services.length, 'שירותים');
        }

        // ===== פונקציות עזר =====
        function formatTime(d) { return new Date(d).toLocaleTimeString('he-IL', { hour: '2-digit', minute: '2-digit' }); }

        function formatDate(d) { return new Date(d).toLocaleDateString('he-IL'); }

        function statusLabel(s) {
            const map = { 'pending': '⏳ ממתין', 'confirmed': '✅ מאושר', 'cancelled': '❌ מבוטל', 'completed': '✔️ הושלם' };
            return map[s] || s;
        }

        function getStatusClass(s) {
            const map = { 'pending': 'badge-pending', 'confirmed': 'badge-confirmed', 'cancelled': 'badge-cancelled',
                'completed': 'badge-completed' };
            return map[s] || '';
        }

        function whatsappLink(phone, name, service, date, time) {
            if (!phone) return '#';
            const clean = phone.replace(/^0/, '');
            const msg = `שלום ${name}, תורך ל-${service} נקבע ל-${date} בשעה ${time}. נתראה!`;
            return `https://wa.me/972${clean}?text=${encodeURIComponent(msg)}`;
        }

        // ===== תצוגה =====
        window.showTab = function(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            const map = { 'today': 0, 'all': 1, 'add': 2, 'services': 3, 'employees': 4, 'settings': 5 };
            if (map[tab] !== undefined) document.querySelectorAll('.tab')[map[tab]].classList.add('active');

            const c = document.getElementById('tabContent');

            if (tab === 'today') {
                const today = new Date();
                today.setHours(0, 0, 0, 0);
                const items = appointments.filter(a => new Date(a.start_time) >= today);
                c.innerHTML = items.length ? items.map(a => `
                        <div class="item">
                            <div><strong>${a.customer_name||'לקוח'}</strong> - ${a.service_name||'שירות'}<br><small>🕐 ${formatTime(a.start_time)}</small></div>
                            <div>
                                <span class="${getStatusClass(a.status)}">${statusLabel(a.status)}</span>
                                ${a.status !== 'cancelled' ? `
                                    <a href="${whatsappLink(a.customer_phone, a.customer_name, a.service_name, formatDate(a.start_time), formatTime(a.start_time))}" target="_blank" class="btn-whatsapp">📤</a>
                                    <button class="btn" style="padding:4px 12px;font-size:12px;background:#e53e3e;" onclick="cancelApp('${a.id}')">בטל</button>
                                ` : ''}
                            </div>
                        </div>
                    `).join('') : '<div style="text-align:center;padding:40px;">📭 אין תורים להיום</div>';
            } else if (tab === 'all') {
                c.innerHTML = appointments.length ? appointments.map(a => `
                        <div class="item">
                            <div><strong>${a.customer_name||'לקוח'}</strong> - ${a.service_name||'שירות'}<br><small>📅 ${formatDate(a.start_time)} 🕐 ${formatTime(a.start_time)}</small></div>
                            <div>
                                <span class="${getStatusClass(a.status)}">${statusLabel(a.status)}</span>
                                ${a.status !== 'cancelled' ? `
                                    <a href="${whatsappLink(a.customer_phone, a.customer_name, a.service_name, formatDate(a.start_time), formatTime(a.start_time))}" target="_blank" class="btn-whatsapp">📤</a>
                                    <button class="btn" style="padding:4px 12px;font-size:12px;background:#e53e3e;" onclick="cancelApp('${a.id}')">בטל</button>
                                ` : ''}
                            </div>
                        </div>
                    `).join('') : '<div style="text-align:center;padding:40px;">📭 אין תורים</div>';
            } else if (tab === 'add') {
                const opts = services.map(s =>
                    `<option value="${s.id}">${s.name} (${s.duration_minutes}דק, ${s.price}₪)</option>`).join('');
                const empOpts = employees.map(e => `<option value="${e.id}">${e.name}</option>`).join('');
                c.innerHTML = `
                        <h3>➕ תור חדש</h3>
                        <form onsubmit="addApp(event)">
                            <input type="text" id="cName" placeholder="שם לקוח" required>
                            <input type="tel" id="cPhone" placeholder="טלפון" required>
                            <select id="sId" required><option value="">בחר שירות...</option>${opts}</select>
                            <select id="empId"><option value="">ללא העדפה</option>${empOpts}</select>
                            <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">
                                <input type="date" id="aDate" required>
                                <input type="time" id="aTime" required>
                            </div>
                            <button type="submit" class="btn" style="width:100%;padding:12px;">💾 שמור תור</button>
                        </form>
                    `;
            } else if (tab === 'services') {
                c.innerHTML = `
                        <div style="display:flex;justify-content:space-between;align-items:center;">
                            <h3>✂️ שירותים</h3>
                            <button class="btn" onclick="addService()">➕ הוסף</button>
                        </div>
                        ${services.length ? services.map(s => `
                            <div class="item">
                                <div><strong>${s.name}</strong> - ${s.duration_minutes}דק, ${s.price}₪</div>
                                <button class="btn" style="padding:4px 12px;font-size:12px;background:#e53e3e;" onclick="deleteService('${s.id}')">🗑️</button>
                            </div>
                        `).join('') : '<div style="text-align:center;padding:40px;">✂️ אין שירותים</div>'}
                    `;
            } else if (tab === 'employees') {
                c.innerHTML = `
                        <div style="display:flex;justify-content:space-between;align-items:center;">
                            <h3>👨‍💼 עובדים</h3>
                            <button class="btn" onclick="addEmployee()">➕ הוסף</button>
                        </div>
                        ${employees.length ? employees.map(e => `
                            <div class="item">
                                <div><strong>${e.name}</strong> ${e.phone ? `- 📞 ${e.phone}` : ''}</div>
                                <button class="btn" style="padding:4px 12px;font-size:12px;background:#e53e3e;" onclick="deleteEmployee('${e.id}')">🗑️</button>
                            </div>
                        `).join('') : '<div style="text-align:center;padding:40px;">👨‍💼 אין עובדים</div>'}
                    `;
            } else if (tab === 'settings') {
                c.innerHTML = `
                        <h3>⚙️ הגדרות</h3>
                        <div style="background:rgba(255,255,255,0.04);padding:16px;border-radius:12px;margin-bottom:12px;">
                            <h4>🕐 שעות עבודה</h4>
                            <p style="color:rgba(255,255,255,0.4);font-size:13px;">בקרוב: עריכת שעות עבודה</p>
                            <button class="btn" onclick="alert('🛠️ בקרוב')" style="padding:4px 16px;font-size:12px;background:#333;">✏️ ערוך</button>
                        </div>
                        <div style="background:rgba(255,255,255,0.04);padding:16px;border-radius:12px;">
                            <h4>🏖️ חגים</h4>
                            <p style="color:rgba(255,255,255,0.4);font-size:13px;">בקרוב: הוספת חגים</p>
                            <button class="btn" onclick="alert('🛠️ בקרוב')" style="padding:4px 16px;font-size:12px;">➕ הוסף חג</button>
                        </div>
                    `;
            }
        };

        // ===== פעולות =====
        window.addApp = async function(e) {
            e.preventDefault();
            const name = document.getElementById('cName').value.trim();
            const phone = document.getElementById('cPhone').value.trim();
            const serviceId = document.getElementById('sId').value;
            const employeeId = document.getElementById('empId').value || null;
            const date = document.getElementById('aDate').value;
            const time = document.getElementById('aTime').value;

            if (!name || !phone || !serviceId || !date || !time) { alert('❌ יש למלא הכל'); return; }
            const service = services.find(s => s.id === serviceId);
            if (!service) { alert('❌ שירות לא נמצא'); return; }

            const start = new Date(`${date}T${time}:00`);
            const end = new Date(start.getTime() + service.duration_minutes * 60000);

            const { error } = await sb.from('appointments').insert([{
                business_id: BUSINESS_ID,
                customer_name: name,
                customer_phone: phone,
                service_id: serviceId,
                service_name: service.name,
                employee_id: employeeId,
                start_time: start.toISOString(),
                end_time: end.toISOString(),
                price: service.price,
                status: 'confirmed'
            }]);

            if (error) { alert('❌ ' + error.message); return; }
            alert('✅ תור נוצר!');
            await loadData();
            showTab('today');
        };

        window.cancelApp = async function(id) {
            if (!confirm('לבטל תור?')) return;
            const { error } = await sb.from('appointments').update({ status: 'cancelled' }).eq('id', id);
            if (error) { alert('❌ ' + error.message); return; }
            alert('✅ בוטל!');
            await loadData();
            showTab('today');
        };

        window.addService = async function() {
            const name = prompt('📝 שם השירות:');
            if (!name) return;
            const duration = parseInt(prompt('⏱️ משך (דקות):'));
            if (!duration) return;
            const price = parseFloat(prompt('💰 מחיר (ש"ח):'));
            if (!price) return;

            const { error } = await sb.from('services').insert([{
                business_id: BUSINESS_ID,
                name: name,
                duration_minutes: duration,
                price: price,
                is_active: true
            }]);

            if (error) { alert('❌ ' + error.message); return; }
            alert('✅ שירות נוסף!');
            await loadData();
            showTab('services');
        };

        window.deleteService = async function(id) {
            if (!confirm('למחוק שירות?')) return;
            const { error } = await sb.from('services').update({ is_active: false }).eq('id', id);
            if (error) { alert('❌ ' + error.message); return; }
            alert('✅ נמחק!');
            await loadData();
            showTab('services');
        };

        window.addEmployee = async function() {
            const name = prompt('📝 שם העובד:');
            if (!name) return;
            const phone = prompt('📞 טלפון:');
            if (!phone) return;

            const { error } = await sb.from('employees').insert([{
                business_id: BUSINESS_ID,
                name: name,
                phone: phone,
                is_active: true
            }]);

            if (error) { alert('❌ ' + error.message); return; }
            alert('✅ עובד נוסף!');
            await loadData();
            showTab('employees');
        };

        window.deleteEmployee = async function(id) {
            if (!confirm('למחוק עובד?')) return;
            const { error } = await sb.from('employees').update({ is_active: false }).eq('id', id);
            if (error) { alert('❌ ' + error.message); return; }
            alert('✅ נמחק!');
            await loadData();
            showTab('employees');
        };

        window.copyLink = function() {
            const linkEl = document.getElementById('clientLink');
            const text = linkEl.textContent;
            navigator.clipboard.writeText(text).then(() => alert('✅ הקישור הועתק!')).catch(() => {
                const ta = document.createElement('textarea');
                ta.value = text;
                document.body.appendChild(ta);
                ta.select();
                document.execCommand('copy');
                ta.remove();
                alert('✅ הקישור הועתק!');
            });
        };

        window.logout = async function() {
            await sb.auth.signOut();
            localStorage.clear();
            window.location.href = 'login.html';
        };

        // ===== הפעלה =====
        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
